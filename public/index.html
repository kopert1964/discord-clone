<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Discord Clone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-primary: #1a1a2e; --bg-secondary: #16213e; --bg-tertiary: #0f3460;
      --text-primary: #e0e0e0; --text-secondary: #a0a0b0; --accent: #6c63ff;
      --accent-hover: #5a52d5; --danger: #e74c3c; --success: #2ecc71;
      --warning: #f39c12; --border: #2a2a4a; --shadow: 0 4px 6px rgba(0,0,0,0.3);
      --radius: 12px; --transition: all 0.2s ease;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes bounceIn { 0% { transform: scale(0.3); opacity: 0; } 50% { transform: scale(1.05); } 70% { transform: scale(0.9); } 100% { transform: scale(1); opacity: 1; } }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    @keyframes voicePulse { 0%, 100% { box-shadow: 0 0 5px var(--success); } 50% { box-shadow: 0 0 20px var(--success), 0 0 40px var(--success); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    .slide-in-left { animation: slideInLeft 0.3s ease forwards; }
    .slide-in-right { animation: slideInRight 0.3s ease forwards; }
    .bounce-in { animation: bounceIn 0.4s ease forwards; }
    
    #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: flex; align-items: center; justify-content: center; }
    #auth-box { background: var(--bg-secondary); padding: 40px; border-radius: var(--radius); width: 400px; max-width: 90%; box-shadow: var(--shadow); animation: bounceIn 0.5s ease; }
    #auth-box h2 { text-align: center; margin-bottom: 24px; color: var(--accent); font-size: 24px; }
    #auth-box input { width: 100%; padding: 12px 16px; margin-bottom: 12px; background: var(--bg-primary); border: 2px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; transition: var(--transition); outline: none; }
    #auth-box input:focus { border-color: var(--accent); }
    #auth-box button { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: var(--transition); }
    #auth-box button:hover { background: var(--accent-hover); transform: translateY(-2px); }
    #auth-toggle { text-align: center; margin-top: 12px; color: var(--text-secondary); cursor: pointer; font-size: 14px; }
    #auth-toggle span { color: var(--accent); text-decoration: underline; }
    .auth-error { color: var(--danger); text-align: center; margin-bottom: 12px; font-size: 14px; min-height: 20px; }
    
    #app { display: flex; height: 100vh; opacity: 0; transition: opacity 0.3s; }
    #app.visible { opacity: 1; }
    
    #sidebar { width: 260px; background: var(--bg-secondary); display: flex; flex-direction: column; border-right: 1px solid var(--border); animation: slideInLeft 0.4s ease; }
    #sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 8px; }
    .section-title { font-size: 11px; text-transform: uppercase; color: var(--text-secondary); padding: 12px 16px 4px; letter-spacing: 1px; }
    #channels-list, #voice-channels-list { overflow-y: auto; padding: 0 8px; }
    .channel-item, .voice-channel-item { padding: 10px 16px; margin: 2px 0; border-radius: 8px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--text-secondary); }
    .channel-item:hover, .voice-channel-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .channel-item.active { background: var(--accent); color: white; font-weight: 600; }
    .voice-channel-item.active { background: #1a5c3a; color: var(--success); font-weight: 600; }
    #add-channel { padding: 10px 16px; margin: 8px; border-radius: 8px; cursor: pointer; background: transparent; border: 2px dashed var(--border); color: var(--text-secondary); text-align: center; font-size: 13px; transition: var(--transition); }
    #add-channel:hover { border-color: var(--accent); color: var(--accent); }
    #sidebar-profile { padding: 16px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 12px; cursor: pointer; transition: var(--transition); }
    #sidebar-profile:hover { background: var(--bg-tertiary); }
    #sidebar-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; color: white; position: relative; overflow: hidden; flex-shrink: 0; cursor: pointer; }
    #sidebar-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    #sidebar-username { font-weight: 600; font-size: 14px; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    #main { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); }
    #chat-header { padding: 16px 24px; border-bottom: 1px solid var(--border); font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px; }
    #messages { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 4px; }
    .message { display: flex; gap: 12px; padding: 8px 12px; border-radius: 8px; transition: var(--transition); animation: fadeIn 0.2s ease; position: relative; }
    .message:hover { background: rgba(255,255,255,0.03); }
    .message-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px; color: white; flex-shrink: 0; overflow: hidden; }
    .message-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .message-content { flex: 1; }
    .message-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .message-username { font-weight: 600; font-size: 14px; }
    .message-time { font-size: 11px; color: var(--text-secondary); }
    .message-edited { font-size: 10px; color: var(--text-secondary); font-style: italic; }
    .message-text { font-size: 14px; line-height: 1.5; word-break: break-word; }
    .message-actions { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); display: none; gap: 4px; background: var(--bg-secondary); border-radius: 6px; padding: 4px; box-shadow: var(--shadow); }
    .message:hover .message-actions { display: flex; }
    .message-actions button { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 14px; transition: var(--transition); }
    .message-actions button:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    
    #input-area { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px; }
    #message-input { flex: 1; padding: 12px 16px; background: var(--bg-secondary); border: 2px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; resize: none; outline: none; font-family: inherit; transition: var(--transition); }
    #message-input:focus { border-color: var(--accent); }
    #send-btn { padding: 12px 20px; background: var(--accent); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: var(--transition); white-space: nowrap; }
    #send-btn:hover { background: var(--accent-hover); transform: translateY(-2px); }
    
    #users-panel { width: 240px; background: var(--bg-secondary); border-left: 1px solid var(--border); padding: 16px; overflow-y: auto; animation: slideInRight 0.4s ease; }
    #users-panel h3 { font-size: 12px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 12px; letter-spacing: 1px; }
    .user-item { display: flex; align-items: center; gap: 10px; padding: 8px; border-radius: 8px; cursor: pointer; transition: var(--transition); margin-bottom: 4px; }
    .user-item:hover { background: var(--bg-tertiary); }
    .user-item-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; position: relative; overflow: hidden; flex-shrink: 0; }
    .user-item-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .status-dot { position: absolute; bottom: 0; right: 0; width: 10px; height: 10px; border-radius: 50%; border: 2px solid var(--bg-secondary); }
    .status-dot.online { background: var(--success); } .status-dot.idle { background: var(--warning); } .status-dot.dnd { background: var(--danger); } .status-dot.offline { background: #666; }
    .user-item-name { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-item-call { background: var(--success); color: white; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 14px; transition: var(--transition); display: none; align-items: center; justify-content: center; }
    .user-item:hover .user-item-call { display: flex; }
    .user-item-call:hover { transform: scale(1.1); }
    
    #incoming-call { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 9999; display: none; align-items: center; justify-content: center; }
    #incoming-call.active { display: flex; animation: fadeIn 0.3s ease; }
    #incoming-call-box { background: var(--bg-secondary); padding: 40px; border-radius: var(--radius); text-align: center; box-shadow: var(--shadow); animation: bounceIn 0.4s ease; }
    #incoming-call-box h3 { margin-bottom: 8px; font-size: 22px; }
    #incoming-call-box p { color: var(--text-secondary); margin-bottom: 24px; }
    .incoming-buttons { display: flex; gap: 16px; justify-content: center; }
    .btn-accept { background: var(--success); color: white; padding: 14px 28px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; }
    .btn-accept:hover { transform: scale(1.05); }
    .btn-reject { background: var(--danger); color: white; padding: 14px 28px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; }
    .btn-reject:hover { transform: scale(1.05); }
    
    #call-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9998; display: none; align-items: center; justify-content: center; flex-direction: column; }
    #call-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
    #call-window { background: var(--bg-secondary); padding: 40px; border-radius: var(--radius); text-align: center; box-shadow: var(--shadow); animation: bounceIn 0.4s ease; }
    #call-window h3 { margin-bottom: 16px; font-size: 20px; }
    #call-timer { font-size: 32px; font-weight: 700; margin: 16px 0; color: var(--accent); }
    #call-voice-indicator { width: 80px; height: 80px; border-radius: 50%; background: var(--bg-tertiary); margin: 16px auto; display: flex; align-items: center; justify-content: center; font-size: 32px; transition: all 0.3s; }
    #call-voice-indicator.speaking { background: var(--success); box-shadow: 0 0 20px var(--success); animation: pulse 0.5s infinite; }
    .call-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    .call-buttons button { padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; font-size: 14px; transition: var(--transition); }
    .btn-end { background: var(--danger); color: white; }
    .btn-end:hover { background: #c0392b; transform: scale(1.05); }
    .btn-mute { background: var(--bg-tertiary); color: var(--text-primary); }
    .btn-mute.muted { background: var(--warning); color: black; }
    
    #voice-room-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-primary); z-index: 9995; display: none; flex-direction: column; }
    #voice-room-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
    #voice-room-header { padding: 16px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    #voice-room-header h3 { font-size: 18px; }
    #voice-room-participants { flex: 1; padding: 24px; display: flex; flex-wrap: wrap; gap: 16px; align-content: flex-start; }
    .voice-participant { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 16px; border-radius: var(--radius); background: var(--bg-secondary); min-width: 100px; }
    .voice-participant-avatar { width: 60px; height: 60px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 24px; color: white; position: relative; overflow: hidden; transition: var(--transition); }
    .voice-participant-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .voice-participant-avatar.speaking { animation: voicePulse 0.6s infinite; border: 3px solid var(--success); }
    .voice-participant-name { font-size: 13px; font-weight: 500; text-align: center; }
    
    #status-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 10001; display: none; align-items: center; justify-content: center; }
    #status-modal.active { display: flex; animation: fadeIn 0.2s ease; }
    #status-modal-content { background: var(--bg-secondary); padding: 24px; border-radius: var(--radius); box-shadow: var(--shadow); width: 300px; }
    #status-modal-content h3 { margin-bottom: 16px; text-align: center; }
    .status-option { padding: 12px 16px; margin: 4px 0; border-radius: 8px; cursor: pointer; transition: var(--transition); display: flex; align-items: center; gap: 10px; }
    .status-option:hover { background: var(--bg-tertiary); }
    
    #notification { position: fixed; top: 20px; right: 20px; background: var(--bg-secondary); padding: 16px 24px; border-radius: var(--radius); box-shadow: var(--shadow); z-index: 10000; transform: translateX(120%); transition: transform 0.3s ease; display: flex; align-items: center; gap: 12px; }
    #notification.show { transform: translateX(0); }
    #notification-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-weight: 700; color: white; overflow: hidden; flex-shrink: 0; }
    #notification-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    #notification-text { font-size: 14px; }
    #notification-text strong { color: var(--accent); }
    
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; } ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    
    @media (max-width: 768px) {
      #sidebar { width: 60px; } #sidebar-header { font-size: 0; justify-content: center; padding: 16px 8px; } #sidebar-header::after { content: '📱'; font-size: 20px; }
      .channel-item, .voice-channel-item { padding: 10px; justify-content: center; font-size: 0; } .channel-item::after { content: '#'; font-size: 18px; } .voice-channel-item::after { content: '🔊'; font-size: 18px; }
      .section-title { display: none; } #sidebar-username { display: none; } #users-panel { display: none; }
      #input-area { padding: 8px; gap: 8px; } #message-input { font-size: 13px; } #send-btn { padding: 10px 14px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div id="auth-overlay">
    <div id="auth-box">
      <h2>🚀 Вход</h2>
      <div class="auth-error" id="auth-error"></div>
      <input type="text" id="auth-username" placeholder="Никнейм">
      <input type="email" id="auth-email" placeholder="Email">
      <input type="password" id="auth-password" placeholder="Пароль">
      <button id="auth-submit">Войти</button>
      <div id="auth-toggle">Нет аккаунта? <span>Зарегистрироваться</span></div>
    </div>
  </div>

  <div id="app">
    <div id="sidebar">
      <div id="sidebar-header">💬 Discord Clone</div>
      <div class="section-title">Текстовые каналы</div>
      <div id="channels-list"></div>
      <div id="add-channel">+ Создать канал</div>
      <div class="section-title">Голосовые каналы</div>
      <div id="voice-channels-list"></div>
      <div id="sidebar-profile">
        <div id="sidebar-avatar" onclick="document.getElementById('avatar-input').click()" title="Сменить аватар">
          <span id="sidebar-avatar-text">?</span>
        </div>
        <span id="sidebar-username"></span>
        <span style="font-size:12px;color:var(--text-secondary)">▼</span>
        <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="uploadAvatar(event)">
      </div>
    </div>

    <div id="main">
      <div id="chat-header">📢 Основной</div>
      <div id="messages"></div>
      <div id="input-area">
        <input type="text" id="message-input" placeholder="Введите сообщение..." maxlength="2000">
        <button id="send-btn">➤</button>
      </div>
    </div>

    <div id="users-panel">
      <h3>👥 Пользователи</h3>
      <div id="users-list"></div>
    </div>
  </div>

  <!-- ВОЙС-РУМ -->
  <div id="voice-room-overlay">
    <div id="voice-room-header">
      <h3 id="voice-room-name">🔊 Голосовой канал</h3>
      <button class="btn-end" onclick="leaveVoiceChannel()" style="padding:10px 20px;">🔴 Выйти</button>
    </div>
    <div id="voice-room-participants"></div>
  </div>

  <!-- ВХОДЯЩИЙ ЗВОНОК -->
  <div id="incoming-call">
    <div id="incoming-call-box">
      <h3>📞 Входящий звонок</h3>
      <p id="incoming-caller-name"></p>
      <div class="incoming-buttons">
        <button class="btn-accept" onclick="acceptIncomingCall()">✅ Принять</button>
        <button class="btn-reject" onclick="rejectIncomingCall()">❌ Отклонить</button>
      </div>
    </div>
  </div>

  <!-- ЗВОНОК -->
  <div id="call-overlay">
    <div id="call-window">
      <h3>📞 Звонок</h3>
      <div id="call-voice-indicator">🎤</div>
      <div id="call-timer">00:00</div>
      <div class="call-buttons">
        <button class="btn-mute" onclick="toggleCallMute()">🎙️ Выкл. микрофон</button>
        <button class="btn-end" onclick="endCallAndNotify()">🔴 Завершить</button>
      </div>
      <div style="margin-top:12px">
        <label style="color:var(--text-secondary);font-size:12px">Громкость:</label>
        <input type="range" id="remote-volume" min="0" max="100" value="100" oninput="setRemoteVolume(this.value)" style="width:100%">
      </div>
    </div>
  </div>

  <div id="status-modal">
    <div id="status-modal-content">
      <h3>Выберите статус</h3>
      <div class="status-option" onclick="setUserStatus('online')">🟢 Онлайн</div>
      <div class="status-option" onclick="setUserStatus('idle')">🟡 Отошёл</div>
      <div class="status-option" onclick="setUserStatus('dnd')">🔴 Не беспокоить</div>
      <div class="status-option" onclick="setUserStatus('offline')">⚫ Невидимый</div>
      <button onclick="document.getElementById('status-modal').classList.remove('active')" style="width:100%;margin-top:12px;padding:10px;background:var(--bg-tertiary);color:var(--text-primary);border:none;border-radius:8px;cursor:pointer">Закрыть</button>
    </div>
  </div>

  <div id="notification">
    <div id="notification-avatar">?</div>
    <div id="notification-text"></div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
<script>
  // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
  let socket;
  let currentUser = null;
  let token = localStorage.getItem('token');
  let currentChannel = 'general';
  let currentDM = null;
  let users = [];
  let channels = [];
  let voiceChannels = [];
  
  // Звонки 1-на-1
  let peerConnection;
  let localStream;
  let remoteAudioElement;
  let currentCallerId;
  let callInProgress = false;
  let callSeconds = 0;
  let callTimerInterval;
  let isMuted = false;
  let incomingOffer = null;
  let incomingCallSoundInterval = null;
  let audioIndicatorInterval = null;

  let voicePeerConnections = {}; // userId -> RTCPeerConnection

  let voiceAudioElements = {}; // userId -> Audio
  let voiceSpeakingInterval = null;
  
  const iceServers = [
    {
        urls: 'stun:stun.l.google.com:19302'
    },
    {
        urls: [
            'turn:global.turn.twilio.com:3478?transport=tcp',
            'turn:global.turn.twilio.com:443?transport=tcp'
        ],
        username: 'f4b4035e6e2c1a2b4c1f8e9d0a7b6c5d4e3f2a1b',
        credential: 'c5d4e3f2a1b0c9d8e7f6a5b4c3d2e1f0'
    }
];
  
  // DOM элементы
  const authOverlay = document.getElementById('auth-overlay');
  const authError = document.getElementById('auth-error');
  const authUsername = document.getElementById('auth-username');
  const authEmail = document.getElementById('auth-email');
  const authPassword = document.getElementById('auth-password');
  const authSubmit = document.getElementById('auth-submit');
  const authToggle = document.getElementById('auth-toggle');
  const authBox = document.getElementById('auth-box');
  const appEl = document.getElementById('app');
  const channelsList = document.getElementById('channels-list');
  const voiceChannelsList = document.getElementById('voice-channels-list');
  const chatHeader = document.getElementById('chat-header');
  const messagesEl = document.getElementById('messages');

  const voiceRoomParticipants = document.getElementById('voice-room-participants');
  
  let isLogin = true;
  
  // ==================== ЗВУКИ ====================
  function playSound(type, freq1, freq2, dur) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = type || 'sine';
      g.gain.value = 0.08;
      o.frequency.setValueAtTime(freq1, ctx.currentTime);
      o.frequency.setValueAtTime(freq2 || freq1, ctx.currentTime + (dur || 0.1));
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + (dur || 0.2));
    } catch(e) {}
  }
  
  function playNotificationSound() { playSound('sine', 800, 1000, 0.2); }
  function playCallSound() { playSound('square', 440, 880, 0.5); }

  // ==================== ЗАПРОС МИКРОФОНА (фикс для мобильных) ====================
  async function ensureLocalStream() {
    if (localStream && localStream.getAudioTracks().length > 0 && localStream.getAudioTracks()[0].readyState === 'live') {
      return localStream;
    }
    
    // Останавливаем старый поток если есть
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    
    console.log('🎤 Запрашиваю микрофон...');
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ 
        audio: { 
          echoCancellation: true, 
          noiseSuppression: true, 
          autoGainControl: true 
        } 
      });
      console.log('✅ Микрофон получен, треки:', localStream.getAudioTracks().length);
      
      // На мобильных устройствах трек может пересоздаться
      localStream.getAudioTracks().forEach(track => {
        track.onended = () => {
          console.warn('⚠️ Аудиотрек завершился, перезапрашиваю...');
          localStream = null;
        };
      });
      
      return localStream;
    } catch(e) {
      console.error('❌ Ошибка микрофона:', e);
      alert('Не удалось получить доступ к микрофону: ' + e.message);
      throw e;
    }
  }

  // Индикатор голоса в войс-руме
  function startVoiceSpeakingDetection() {
    if (voiceSpeakingInterval) return;
    voiceSpeakingInterval = setInterval(() => {
      if (!localStream) return;
      const track = localStream.getAudioTracks()[0];
      if (track && track.readyState === 'live') {
        // Анализируем громкость
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const analyser = audioContext.createAnalyser();
        const source = audioContext.createMediaStreamSource(new MediaStream([track]));
        source.connect(analyser);
        analyser.fftSize = 256;
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        const avg = data.reduce((a, b) => a + b, 0) / data.length;
        
        const avatar = document.querySelector(`#vp-${currentUser?.id} .voice-participant-avatar`);
        if (avatar) {
          if (avg > 30) {
            avatar.classList.add('speaking');
          } else {
            avatar.classList.remove('speaking');
          }
        }
        
        audioContext.close();
      }
    }, 300);
  }
  
  function stopVoiceSpeakingDetection() {
    if (voiceSpeakingInterval) {
      clearInterval(voiceSpeakingInterval);
      voiceSpeakingInterval = null;
    }
  }
  
  // WebRTC для войс-рума (mesh: каждый с каждым)
  async function connectToVoiceUser(userId) {
    if (voicePeerConnections[userId]) return;
    if (userId === currentUser?.id) return;
    
    try {
      await ensureLocalStream();
    } catch(e) { return; }
    
    const pc = new RTCPeerConnection({ iceServers });
    voicePeerConnections[userId] = pc;
    
    localStream.getTracks().forEach(track => {
      pc.addTrack(track, localStream);
    });
    
    pc.ontrack = (event) => {
      if (event.streams[0]) {
        // Удаляем старый аудио если есть
        if (voiceAudioElements[userId]) {
          voiceAudioElements[userId].srcObject = null;
          voiceAudioElements[userId].remove();
        }
        const audio = new Audio();
        audio.srcObject = event.streams[0];
        audio.autoplay = true;
        audio.play().catch(e => console.error('Voice audio play error:', e));
        voiceAudioElements[userId] = audio;
      }
    };
    
    pc.onicecandidate = (e) => {
      if (e.candidate) {
        socket.emit('voice-ice', { channelId: currentVoiceChannel, to: userId, candidate: e.candidate });
      }
    };
    
    pc.onnegotiationneeded = async () => {
      try {
        const offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: false });
        await pc.setLocalDescription(offer);
        socket.emit('voice-offer', { channelId: currentVoiceChannel, offer });
      } catch(e) { console.error('Voice negotiation error:', e); }
    };
    
    // Создаём offer
    const offer = await pc.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: false });
    await pc.setLocalDescription(offer);
    socket.emit('voice-offer', { channelId: currentVoiceChannel, offer });
  }

    socket.emit('call-accept', { to: currentCallerId });
    
    // Принудительно запрашиваем микрофон
    try {
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      localStream = await navigator.mediaDevices.getUserMedia({ 
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
      });
    } catch(e) {
      console.error('Ошибка микрофона при приёме:', e);
      endCall();
      return;
    }
    
    if (incomingOffer) {
      await handleOffer(currentCallerId, incomingOffer);

    startTimer();
    startAudioIndicator();
}

  function escapeHTML(str) {

  function editMessage(msgId) {
    const msgEl = document.getElementById('msg-' + msgId);
    if (!msgEl) return;
    const textEl = msgEl.querySelector('.message-text');
    const oldText = textEl.textContent;
    
    const input = document.createElement('input');
    input.type = 'text';
    input.value = oldText;
    input.style.cssText = 'width:100%;padding:8px;background:var(--bg-primary);border:2px solid var(--accent);border-radius:6px;color:var(--text-primary);font-size:14px;';
    
    textEl.innerHTML = '';
    textEl.appendChild(input);
    input.focus();
    input.select();
    
    const save = () => {
      const newText = input.value.trim();
      if (newText && newText !== oldText) {
        socket.emit('edit-message', { messageId: msgId, text: newText });
      } else {
        textEl.textContent = oldText;
      }
    };
    
    input.addEventListener('blur', save);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { input.blur(); }
      if (e.key === 'Escape') { textEl.textContent = oldText; }
    });
  }
  
  function deleteMessage(msgId) {

  // ==================== СОКЕТ СОБЫТИЯ ====================
  function setupSocketEvents() {
    socket.on('new-message', (msg) => {
      if (msg.channelId === currentChannel && !currentDM) {
        addMessageToDOM(msg, true);
        if (msg.userId !== currentUser?.id) playNotificationSound();
      }
    });
    
    socket.on('new-dm', ({ from, message }) => {
      if (currentDM === from || currentDM === message.userId) {
        addMessageToDOM(message, true);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
      if (message.userId !== currentUser?.id) {
        const user = users.find(u => u.id === message.userId);
        showNotification(`💬 <strong>${user?.username || message.username}</strong>: ${message.text.slice(0, 50)}`);
        playNotificationSound();
      }
    });
    
    socket.on('message-edited', ({ messageId, text, edited }) => {
      const msgEl = document.getElementById('msg-' + messageId);
      if (msgEl) {
        msgEl.querySelector('.message-text').textContent = text;
        if (edited) {
          const editedEl = msgEl.querySelector('.message-edited');
          if (!editedEl) {
            const span = document.createElement('span');
            span.className = 'message-edited';
            span.textContent = '(изменено)';
            msgEl.querySelector('.message-header').appendChild(span);
          }
        }
      }
    });
    
    socket.on('message-deleted', ({ messageId }) => {
      const msgEl = document.getElementById('msg-' + messageId);
      if (msgEl) {
        msgEl.style.animation = 'fadeIn 0.2s ease reverse';
        setTimeout(() => msgEl.remove(), 200);
      }
    });
    
    socket.on('user-status', ({ id, status }) => {
      const user = users.find(u => u.id === id);
      if (user) { user.status = status; renderUsers(); }
    });
    
    socket.on('user-updated', (userData) => {
      const user = users.find(u => u.id === userData.id);
      if (user) { user.avatar = userData.avatar; user.status = userData.status; renderUsers(); }
    });
    
    socket.on('channel-created', (channel) => {
      channels.push(channel);
      renderChannels();
    });
    
    // Голосовые каналы
    socket.on('voice-users-update', ({ channelId, users: vcUsers }) => {
      const vc = voiceChannels.find(v => v.id === channelId);
      if (vc) {
        vc.userCount = vcUsers.length;
        renderVoiceChannels();
      }
      if (currentVoiceChannel === channelId) {
        voiceParticipants = vcUsers.map(u => {
          const user = users.find(fu => fu.id === u.userId);
          return { userId: u.userId, username: u.username, avatar: user?.avatar || null };
        });
        renderVoiceParticipants();
      }
    });
    
    socket.on('user-joined-voice', ({ userId, username }) => {
      if (currentVoiceChannel) {
        playJoinSound();
        const user = users.find(u => u.id === userId);
        voiceParticipants.push({ userId, username, avatar: user?.avatar || null });
        renderVoiceParticipants();
        connectToVoiceUser(userId);
        showNotification(`🔊 <strong>${username}</strong> зашёл в голосовой канал`);
      }
    });
    
    socket.on('user-left-voice', ({ userId }) => {
      if (currentVoiceChannel) {
        playLeaveSound();
        voiceParticipants = voiceParticipants.filter(p => p.userId !== userId);
        renderVoiceParticipants();
        if (voicePeerConnections[userId]) {
          voicePeerConnections[userId].close();
          delete voicePeerConnections[userId];
        }
        if (voiceAudioElements[userId]) {
          voiceAudioElements[userId].srcObject = null;
          voiceAudioElements[userId].remove();
          delete voiceAudioElements[userId];
        }
      }
    });
    
    socket.on('voice-offer', async ({ from, offer }) => {
      if (!currentVoiceChannel) return;
      const pc = new RTCPeerConnection({ iceServers });
      voicePeerConnections[from] = pc;
      
      try {
        await ensureLocalStream();
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
      } catch(e) { return; }
      
      pc.ontrack = (event) => {
        if (event.streams[0]) {
          if (voiceAudioElements[from]) {
            voiceAudioElements[from].srcObject = null;
            voiceAudioElements[from].remove();
          }
          const audio = new Audio();
          audio.srcObject = event.streams[0];
          audio.autoplay = true;
          audio.play().catch(e => {});
          voiceAudioElements[from] = audio;
        }
      };
      
      pc.onicecandidate = (e) => {
        if (e.candidate) socket.emit('voice-ice', { channelId: currentVoiceChannel, to: from, candidate: e.candidate });
      };
      
      await pc.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      socket.emit('voice-answer', { channelId: currentVoiceChannel, to: from, answer });
    });
    
    socket.on('voice-answer', async ({ from, answer }) => {
      const pc = voicePeerConnections[from];
      if (pc) await pc.setRemoteDescription(new RTCSessionDescription(answer));
    });
    
    socket.on('voice-ice', async ({ from, candidate }) => {
      const pc = voicePeerConnections[from];
      if (pc) {
        try { await pc.addIceCandidate(new RTCIceCandidate(candidate)); } catch(e) {}
      }
    });
    
    // Звонки 1-на-1
    socket.on('call-offer', ({ from, offer, callerName }) => {
      if (callInProgress) {
        socket.emit('call-reject', { to: from });
        return;
      }
      currentCallerId = from;
      incomingOffer = offer;
      document.getElementById('incoming-caller-name').textContent = 'Звонит: ' + (callerName || 'Пользователь');
      document.getElementById('incoming-call').classList.add('active');
      playCallSound();
      incomingCallSoundInterval = setInterval(() => playCallSound(), 2000);
    });
    
    socket.on('call-answer', ({ from, answer }) => {
      handleAnswer(from, answer);
    });
    
    socket.on('call-ice', ({ from, candidate }) => {
      handleICE(from, candidate);
    });
    
    socket.on('call-accepted', () => {
      startTimer();
      showCallWindow('active');
      startAudioIndicator();
    });
    
    socket.on('call-rejected', () => {
      stopIncomingSound();
      document.getElementById('incoming-call').classList.remove('active');
      alert('📵 Звонок отклонён');
      endCall();
    });
    
    socket.on('call-ended', () => {
      stopIncomingSound();
      document.getElementById('incoming-call').classList.remove('active');
      if (callInProgress) {
        alert('📴 Собеседник завершил звонок');
      }
      endCall();
    });
  }
  
  // ==================== UI ====================
  function setupUIEvents() {
    document.getElementById('sidebar-profile').addEventListener('click', () => {
      document.getElementById('status-modal').classList.add('active');
    });
    
    document.getElementById('status-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('status-modal')) {
        document.getElementById('status-modal').classList.remove('active');
      }
    });
    
    document.getElementById('add-channel').addEventListener('click', () => {
      const name = prompt('Название канала:');
      if (!name?.trim()) return;
      fetch('/api/channels', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ name: name.trim() })
      }).then(() => loadChannels());
    });
  }
  
  function updateSidebarProfile() {
    if (!currentUser) return;
    document.getElementById('sidebar-username').textContent = currentUser.username;
    
    const avatarEl = document.getElementById('sidebar-avatar');
    const avatarText = document.getElementById('sidebar-avatar-text');
    
    if (currentUser.avatar) {
      avatarText.style.display = 'none';
      let img = avatarEl.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        img.src = currentUser.avatar;
        avatarEl.appendChild(img);
      }
      img.src = currentUser.avatar;
    } else {
      avatarText.textContent = currentUser.username[0].toUpperCase();
      avatarText.style.display = '';
      const img = avatarEl.querySelector('img');
      if (img) img.remove();
    }
  }
  
  async function uploadAvatar(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const formData = new FormData();
    formData.append('avatar', file);
    
    try {
      const res = await fetch('/api/avatar', {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: formData
      });
      const data = await res.json();
      currentUser.avatar = data.avatar;
      updateSidebarProfile();
      showNotification('✅ Аватар обновлён!');
    } catch(e) {
      showNotification('❌ Ошибка загрузки');
    }
  }
  
  function setUserStatus(status) {
    socket.emit('set-status', { status });
    document.getElementById('status-modal').classList.remove('active');
  }
  
  function showNotification(text) {
    notificationText.innerHTML = text;
    notification.classList.add('show');
    setTimeout(() => notification.classList.remove('show'), 3000);
  }
  
  // ==================== ЗВОНКИ ====================
  function startAudioIndicator() {
    if (audioIndicatorInterval) return;
    const indicator = document.getElementById('call-voice-indicator');
    audioIndicatorInterval = setInterval(() => {
      if (localStream) {
        const track = localStream.getAudioTracks()[0];
        if (track && track.readyState === 'live') {
          const audioContext = new (window.AudioContext || window.webkitAudioContext)();
          const analyser = audioContext.createAnalyser();
          const source = audioContext.createMediaStreamSource(new MediaStream([track]));
          source.connect(analyser);
          analyser.fftSize = 256;
          const data = new Uint8Array(analyser.frequencyBinCount);
          analyser.getByteFrequencyData(data);
          const avg = data.reduce((a, b) => a + b, 0) / data.length;
          if (avg > 30) {
            indicator.classList.add('speaking');
          } else {
            indicator.classList.remove('speaking');
          }
          audioContext.close();
        }
      }
    }, 300);
  }
  
  function stopAudioIndicator() {
    if (audioIndicatorInterval) {
      clearInterval(audioIndicatorInterval);
      audioIndicatorInterval = null;
    }
    document.getElementById('call-voice-indicator').classList.remove('speaking');
  }
  
  async function createOffer() {
    console.log('📤 Создаю WebRTC offer');
    
    try {
      await ensureLocalStream();
    } catch(e) {
      endCall();
      return;
    }
    
    try {
      if (peerConnection) peerConnection.close();
      
      peerConnection = new RTCPeerConnection({ iceServers });
      
      localStream.getTracks().forEach(t => {
        console.log('➕ Добавляю трек:', t.kind, t.readyState);
        peerConnection.addTrack(t, localStream);
      });
      
      peerConnection.ontrack = (event) => {
        console.log('🎵 Получен удалённый аудиопоток, стримов:', event.streams.length);
        if (event.streams[0]) {
          if (remoteAudioElement) { remoteAudioElement.srcObject = null; remoteAudioElement.remove(); }
          remoteAudioElement = new Audio();
          remoteAudioElement.srcObject = event.streams[0];
          remoteAudioElement.autoplay = true;
          remoteAudioElement.volume = document.getElementById('remote-volume').value / 100;
          remoteAudioElement.play().then(() => console.log('✅ Аудио играет')).catch(e => console.error('Play error:', e));
        }
      };
      
      peerConnection.onicecandidate = (e) => {
        if (e.candidate) {
          console.log('📤 ICE кандидат:', e.candidate.type);
          socket.emit('call-ice', { to: currentCallerId, candidate: e.candidate });
        }
      };
      
      peerConnection.onconnectionstatechange = () => {
        console.log('📡 Состояние звонка:', peerConnection.connectionState);
        if (peerConnection.connectionState === 'failed' || peerConnection.connectionState === 'disconnected') {
          alert('Соединение потеряно');
          endCall();
        }
      };
      
      peerConnection.oniceconnectionstatechange = () => {
        console.log('🧊 ICE состояние:', peerConnection.iceConnectionState);
      };
      
      const offer = await peerConnection.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: false });
      await peerConnection.setLocalDescription(offer);
      console.log('📤 Offer создан и установлен');
      
      socket.emit('call-offer', { to: currentCallerId, offer });
      
      showCallWindow('active');
      startAudioIndicator();
    } catch(e) {
      console.error('Offer error:', e);
      alert('Ошибка создания звонка: ' + e.message);
      endCall();
    }
  }
  
  async function handleOffer(from, offer) {
    console.log('📨 Обработка offer от:', from);
    
    // ПРИНУДИТЕЛЬНО запрашиваем микрофон для принимающего (телефон)
    try {
      console.log('🎤 handleOffer: запрашиваю микрофон...');
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
      localStream = await navigator.mediaDevices.getUserMedia({ 
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
      });
      console.log('✅ handleOffer: микрофон получен, треки:', localStream.getAudioTracks().length);
    } catch(e) {
      console.error('❌ handleOffer: ошибка микрофона:', e);
      socket.emit('call-reject', { to: from });
      return;
    }
    
    try {
      if (peerConnection) peerConnection.close();
      
      peerConnection = new RTCPeerConnection({ iceServers });
      
      // Добавляем треки
      localStream.getTracks().forEach(t => {
        console.log('➕ handleOffer: добавляю трек:', t.kind, t.readyState);
        peerConnection.addTrack(t, localStream);
      });
      
      peerConnection.ontrack = (event) => {
        console.log('🎵 handleOffer: получен удалённый поток, стримов:', event.streams.length);
        if (event.streams[0]) {
          if (remoteAudioElement) { remoteAudioElement.srcObject = null; remoteAudioElement.remove(); }
          remoteAudioElement = new Audio();
          remoteAudioElement.srcObject = event.streams[0];
          remoteAudioElement.autoplay = true;
          remoteAudioElement.volume = document.getElementById('remote-volume').value / 100;
          remoteAudioElement.play().then(() => console.log('✅ handleOffer: аудио играет')).catch(e => console.error('handleOffer play error:', e));
        }
      };
      
      peerConnection.onicecandidate = (e) => {
        if (e.candidate) {
          console.log('📤 handleOffer: ICE кандидат:', e.candidate.type);
          socket.emit('call-ice', { to: from, candidate: e.candidate });
        }
      };
      
      peerConnection.onconnectionstatechange = () => {
        console.log('📡 handleOffer: состояние:', peerConnection.connectionState);
        if (peerConnection.connectionState === 'failed' || peerConnection.connectionState === 'disconnected') {
          alert('Соединение потеряно');
          endCall();
        }
      };
      
      peerConnection.oniceconnectionstatechange = () => {
        console.log('🧊 handleOffer: ICE состояние:', peerConnection.iceConnectionState);
      };
      
      await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);
      console.log('📤 handleOffer: Answer отправлен');
      
      socket.emit('call-answer', { to: from, answer });
      
      callInProgress = true;
      showCallWindow('active');
      startTimer();
      startAudioIndicator();
    } catch(e) {
      console.error('handleOffer error:', e);
      alert('Ошибка: ' + e.message);
      endCall();
    }
}
  
  async function handleAnswer(from, answer) {
    try {
      if (peerConnection) {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        console.log('✅ Answer установлен');
      }
    } catch(e) { console.error('Answer error:', e); }
  }
  
  async function handleICE(from, candidate) {
    try {
      if (peerConnection) {
        await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
        console.log('✅ ICE кандидат добавлен:', candidate.type);
      }
    } catch(e) { console.error('ICE error:', e); }
  }
  
  function showCallWindow(state) {
    document.getElementById('call-overlay').classList.toggle('active', state === 'active');
  }
  
  function startTimer() {
    callSeconds = 0;
    if (callTimerInterval) clearInterval(callTimerInterval);
    document.getElementById('call-timer').textContent = '00:00';
    
    callTimerInterval = setInterval(() => {
      callSeconds++;
      const m = String(Math.floor(callSeconds / 60)).padStart(2, '0');
      const s = String(callSeconds % 60).padStart(2, '0');
      document.getElementById('call-timer').textContent = `${m}:${s}`;
    }, 1000);
  }
  
  function toggleCallMute() {
    isMuted = !isMuted;
    if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
    const btn = document.querySelector('.btn-mute');
    if (btn) {
      btn.textContent = isMuted ? '🔇 Вкл. микрофон' : '🎙️ Выкл. микрофон';
      btn.classList.toggle('muted', isMuted);
    }
  }
  
  function setRemoteVolume(value) {
    if (remoteAudioElement) remoteAudioElement.volume = value / 100;
  }
  
  function endCallAndNotify() {
    if (currentCallerId) {
      socket.emit('call-end', { to: currentCallerId });
    }
    endCall();
  }
  
  function endCall() {
    stopIncomingSound();
    stopAudioIndicator();
    
    document.getElementById('incoming-call').classList.remove('active');
    document.getElementById('call-overlay').classList.remove('active');
    
    if (peerConnection) { peerConnection.close(); peerConnection = null; }
    if (remoteAudioElement) { remoteAudioElement.srcObject = null; remoteAudioElement.remove(); remoteAudioElement = null; }
    if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
    
    callInProgress = false;
    callSeconds = 0;
    isMuted = false;
    incomingOffer = null;
    
    document.getElementById('call-timer').textContent = '00:00';
    currentCallerId = null;
  }
  
  // ==================== ЗАПУСК ====================
  checkToken();
</script>
</body>
