<!DOCTYPE html>
<html>
<head>
  <title>💬 Discord Clone</title>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }
    
    :root {
      --bg-primary: #0f0f1a;
      --bg-secondary: #1a1a2e;
      --bg-sidebar: #141424;
      --bg-hover: #2a2a4a;
      --bg-active: #3a3a6a;
      --text-primary: #e8e8f0;
      --text-secondary: #a0a0c0;
      --text-muted: #6a6a8a;
      --accent: #6c5ce7;
      --green: #00d4a0;
      --red: #ff6b6b;
      --border: #2a2a4a;
    }

    body { display: flex; height: 100vh; background: var(--bg-primary); color: var(--text-primary); overflow: hidden; }

    #auth {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      display: flex; justify-content: center; align-items: center; z-index: 10000;
    }
    #auth.hidden { display: none; }

    .auth-box {
      background: var(--bg-secondary); padding: 40px; border-radius: 20px;
      border: 1px solid var(--border); min-width: 340px;
    }
    .auth-box h2 { font-size: 28px; margin-bottom: 8px; color: var(--accent); }
    .auth-box input {
      width: 100%; padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border);
      background: var(--bg-primary); color: var(--text-primary); margin-bottom: 12px;
    }
    .auth-box input:focus { outline: none; border-color: var(--accent); }
    .auth-box .btn-primary {
      width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 10px;
      color: white; font-weight: 700; cursor: pointer;
    }
    .auth-box .btn-primary:hover { opacity: 0.8; }
    .hidden { display: none !important; }

    #app { display: none; width: 100%; height: 100vh; }
    #app.active { display: flex; }

    .sidebar {
      width: 270px; min-width: 270px; background: var(--bg-sidebar);
      padding: 12px; overflow-y: auto; border-right: 1px solid var(--border);
      display: flex; flex-direction: column; gap: 8px;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .sidebar .logo { font-size: 20px; font-weight: 800; padding: 4px 0; color: var(--accent); }
    .sidebar .section-title { color: var(--text-muted); font-size: 11px; font-weight: 700; text-transform: uppercase; margin: 8px 0 2px; }
    .sidebar .item {
      padding: 8px 12px; border-radius: 8px; cursor: pointer; transition: all 0.2s;
      color: var(--text-secondary); font-size: 13px;
    }
    .sidebar .item:hover { background: var(--bg-hover); color: var(--text-primary); }
    .sidebar .item.active { background: var(--bg-active); color: var(--text-primary); }
    .sidebar .item .icon { margin-right: 8px; }

    .search-box { display: flex; gap: 4px; }
    .search-box input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-size: 12px; }
    .search-box input:focus { outline: none; border-color: var(--accent); }
    .search-box button { padding: 8px 12px; border-radius: 8px; border: none; background: var(--accent); color: white; cursor: pointer; }

    .invite-box { display: flex; gap: 4px; }
    .invite-box input { flex: 1; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-primary); color: var(--text-primary); font-size: 12px; text-transform: uppercase; }
    .invite-box button { padding: 8px 12px; border-radius: 8px; border: none; background: var(--green); color: #0f0f1a; cursor: pointer; font-weight: 700; }

    .btn-create-server {
      padding: 8px; border-radius: 8px; border: 2px dashed var(--border);
      background: transparent; color: var(--text-secondary); cursor: pointer;
      font-weight: 600; width: 100%; text-align: center;
    }
    .btn-create-server:hover { border-color: var(--accent); color: var(--text-primary); }

    .online-user {
      padding: 6px 10px; border-radius: 8px; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
    }
    .online-user:hover { background: var(--bg-hover); }
    .online-user .user-info { display: flex; align-items: center; gap: 8px; }
    .online-user .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
    .online-user .btn-call {
      background: var(--green); border: none; padding: 2px 10px; border-radius: 6px;
      cursor: pointer; font-weight: 700; font-size: 11px; color: #0f0f1a;
    }
    .online-user .btn-call:hover { opacity: 0.8; }

    .friend-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 10px; border-radius: 8px;
    }
    .friend-item:hover { background: var(--bg-hover); }
    .friend-item .friend-actions { display: flex; gap: 4px; }
    .friend-item .friend-actions button {
      padding: 2px 10px; border: none; border-radius: 6px; cursor: pointer;
      font-weight: 600; font-size: 11px;
    }
    .friend-item .friend-actions .btn-chat { background: var(--accent); color: white; }
    .friend-item .friend-actions .btn-call { background: var(--green); color: #0f0f1a; }

    .search-result {
      padding: 6px 10px; border-radius: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .search-result:hover { background: var(--bg-hover); }
    .search-result .add-btn {
      padding: 2px 12px; border: none; border-radius: 6px;
      background: var(--green); color: #0f0f1a; cursor: pointer; font-weight: 700;
    }

    .server-result { padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .server-result:hover { background: var(--bg-hover); }

    .chat { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); min-width: 0; }

    .chat-header {
      padding: 12px 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      background: var(--bg-secondary);
    }
    .chat-header .chat-title { font-size: 16px; font-weight: 700; }
    .chat-header .private-badge {
      background: var(--accent); padding: 2px 12px; border-radius: 20px;
      font-size: 10px; color: white; margin-left: 10px;
    }
    .chat-header .voice-controls button {
      padding: 6px 14px; border: none; border-radius: 8px; cursor: pointer;
      font-weight: 600; font-size: 12px; margin-left: 6px;
    }
    .chat-header .btn-voice { background: var(--green); color: #0f0f1a; }
    .chat-header .btn-voice.active { background: var(--red); color: white; }

    .messages {
      flex: 1; padding: 16px 20px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 4px;
    }
    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .message {
      padding: 6px 14px; background: var(--bg-secondary); border-radius: 10px;
      max-width: 75%; word-wrap: break-word; animation: messageIn 0.2s ease;
    }
    .message.own { align-self: flex-end; background: var(--bg-active); }
    @keyframes messageIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .message .msg-user { font-weight: 700; color: var(--accent); font-size: 12px; }
    .message .msg-time { font-size: 9px; color: var(--text-muted); margin-left: 8px; }
    .message .msg-text { margin-top: 2px; font-size: 13px; }

    .input-area {
      padding: 12px 20px; border-top: 1px solid var(--border);
      display: flex; gap: 10px; background: var(--bg-secondary);
    }
    .input-area input {
      flex: 1; padding: 10px 16px; border-radius: 10px;
      border: 1px solid var(--border); background: var(--bg-primary);
      color: var(--text-primary); font-size: 13px;
    }
    .input-area input:focus { outline: none; border-color: var(--accent); }
    .input-area button {
      padding: 10px 24px; border-radius: 10px; border: none;
      background: var(--accent); color: white; font-weight: 700; cursor: pointer;
    }

    /* ===== ОКНО ЗВОНКА ===== */
    #call-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
      display: none; justify-content: center; align-items: center; z-index: 9999;
    }
    #call-overlay.active { display: flex; }

    #call-window {
      background: var(--bg-secondary); border-radius: 20px;
      padding: 40px; text-align: center; min-width: 340px;
      border: 1px solid var(--border); animation: callIn 0.3s ease;
    }
    @keyframes callIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    #call-window .caller-avatar { font-size: 60px; display: block; margin-bottom: 8px; }
    #call-window .caller-name { font-size: 24px; font-weight: 700; }
    #call-window .call-status { color: var(--text-secondary); margin-bottom: 16px; }
    #call-window .call-timer { font-size: 32px; font-weight: 700; color: var(--green); margin-bottom: 16px; }

    #call-window .voice-indicators {
      display: flex; justify-content: center; gap: 30px; margin-bottom: 20px;
      font-size: 13px; color: var(--text-secondary);
    }
    .voice-indicator {
      width: 14px; height: 14px; border-radius: 50%; display: inline-block; margin-left: 6px;
    }
    .voice-indicator.speaking { background: var(--green); box-shadow: 0 0 20px rgba(0,212,160,0.5); animation: pulse 0.3s infinite alternate; }
    .voice-indicator.silent { background: var(--text-muted); }
    @keyframes pulse { 0% { opacity: 0.5; } 100% { opacity: 1; } }

    #call-window .call-buttons { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    #call-window .call-buttons button {
      padding: 10px 24px; border: none; border-radius: 50px;
      font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .btn-accept { background: var(--green); color: #0f0f1a; }
    .btn-reject { background: var(--red); color: white; }
    .btn-end { background: var(--red); color: white; }
    .btn-mute { background: var(--bg-hover); color: var(--text-primary); }
    .btn-cancel { background: #fdcb6e; color: #0f0f1a; }

    /* Voice channel indicator */
    .voice-channel-badge {
      background: var(--green); padding: 2px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 700; color: #0f0f1a; margin-left: 8px;
    }
    .voice-user-count { font-size: 11px; color: var(--text-muted); margin-left: 6px; }

    @media (max-width: 768px) {
      .sidebar { width: 200px; min-width: 200px; }
      #call-window { padding: 24px; min-width: auto; }
      .auth-box { min-width: auto; padding: 24px; }
    }
  </style>
</head>
<body>

<!-- ===== АВТОРИЗАЦИЯ ===== -->
<div id="auth">
  <div class="auth-box" id="login">
    <h2>💬 Discord clone by Artem</h2>
    <input id="login-username" placeholder="Имя пользователя" />
    <input id="login-password" type="password" placeholder="Пароль" />
    <button class="btn-primary" onclick="login()">🚀 Войти</button>
    <span style="display:block;text-align:center;margin-top:12px;color:var(--text-secondary);">Нет аккаунта? <a onclick="showRegister()" style="color:var(--accent);cursor:pointer;">Регистрация</a></span>
  </div>
  <div class="auth-box hidden" id="register">
    <h2>💬 Discord clone</h2>
    <input id="reg-username" placeholder="Имя пользователя" />
    <input id="reg-password" type="password" placeholder="Пароль" />
    <button class="btn-primary" onclick="register()">🎉 Регистрация</button>
    <span style="display:block;text-align:center;margin-top:12px;color:var(--text-secondary);">Уже есть аккаунт? <a onclick="showLogin()" style="color:var(--accent);cursor:pointer;">Войти</a></span>
  </div>
</div>

<!-- ===== ОСНОВНОЙ ИНТЕРФЕЙС ===== -->
<div id="app">
  <div class="sidebar">
    <div class="logo">💬 Discord clone By Artem</div>
    
    <div class="section-title">📡 СЕРВЕРА</div>
    <div id="servers-list"></div>
    
    <div class="search-box">
      <input id="server-search" placeholder="🔍 Поиск..." oninput="searchServers(this.value)" />
      <button onclick="searchServers(document.getElementById('server-search').value)">Искать</button>
    </div>
    <div id="server-search-results"></div>
    
    <div class="invite-box">
      <input id="invite-code" placeholder="🔑 Код" />
      <button onclick="joinServerByInvite()">➕</button>
    </div>
    
    <button class="btn-create-server" onclick="createServer()">➕ Создать сервер</button>
    
    <div class="section-title" style="margin-top:12px;">👥 ДРУЗЬЯ</div>
    <div id="friends-list"></div>
    
    <div class="section-title" style="margin-top:8px;">🔍 НАЙТИ</div>
    <input id="search-user" placeholder="Поиск пользователей..." oninput="searchUsers()" style="width:100%;padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--bg-primary);color:var(--text-primary);" />
    <div id="search-results"></div>
    
    <div class="section-title" style="margin-top:12px;">🟢 ОНЛАЙН</div>
    <div id="users-list"></div>
  </div>

  <div class="chat">
    <div class="chat-header" id="chat-header">
      <div class="chat-title" id="chat-title"># general</div>
      <div class="voice-controls" id="voice-controls">
        <button class="btn-voice" onclick="toggleVoiceChannel()">🎤 Войти в голосовой</button>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input id="message-input" placeholder="💬 Напиши сообщение..." />
      <button onclick="sendMessage()">Отправить</button>
    </div>
  </div>
</div>

<!-- ===== ОКНО ЗВОНКА ===== -->
<div id="call-overlay">
  <div id="call-window">
    <span class="caller-avatar" id="caller-avatar">👤</span>
    <div class="caller-name" id="caller-name">Имя</div>
    <div class="call-status" id="call-status">Звонок...</div>
    <div class="call-timer" id="call-timer">00:00</div>
    <div class="voice-indicators">
      <span>Ты <span class="voice-indicator silent" id="my-voice-indicator"></span></span>
      <span>Собеседник <span class="voice-indicator silent" id="their-voice-indicator"></span></span>
    </div>
    <div class="call-buttons" id="call-buttons"></div>
  </div>
</div>

<script>
// ============================================================
//  ПЕРЕМЕННЫЕ
// ============================================================
let socket, currentUser, currentChannel, currentServer, token;
let localStream = null;
let peerConnection = null;
let callInProgress = false;
let currentCallerId = null;
let currentCallerUsername = null;
let isMuted = false;
let isPrivateChat = false;
let privateChatFriendId = null;
let privateChatFriendName = null;
let callTimerInterval = null;
let callSeconds = 0;
let audioContext = null;
let analyser = null;
let dataArray = null;
let animationId = null;
let inVoiceChannel = false;
let currentVoiceChannelId = null;

// ============================================================
//  АВТОРИЗАЦИЯ
// ============================================================
function showRegister() {
  document.getElementById('login').classList.add('hidden');
  document.getElementById('register').classList.remove('hidden');
}
function showLogin() {
  document.getElementById('register').classList.add('hidden');
  document.getElementById('login').classList.remove('hidden');
}

async function register() {
  const username = document.getElementById('reg-username').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username || !password) return alert('Заполни все поля!');
  const res = await fetch('/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  if (res.ok) { alert('✅ Зарегистрирован!'); showLogin(); }
  else alert('❌ Пользователь уже существует');
}

function loadSavedLogin() {
  const saved = localStorage.getItem('discord_user');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      document.getElementById('login-username').value = data.username || '';
      document.getElementById('login-password').value = data.password || '';
      if (data.username && data.password) setTimeout(() => login(), 300);
    } catch(e) {}
  }
}

function saveLogin(username, password) {
  localStorage.setItem('discord_user', JSON.stringify({ username, password }));
}

async function login() {
  const username = document.getElementById('login-username').value.trim();
  const password = document.getElementById('login-password').value;
  if (!username || !password) return alert('Введи логин и пароль!');
  
  const res = await fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password })
  });
  const data = await res.json();
  if (data.token) {
    token = data.token;
    currentUser = data.user;
    saveLogin(username, password);
    document.getElementById('auth').classList.add('hidden');
    document.getElementById('app').classList.add('active');
    initSocket();
    loadServers();
    loadFriends();
  } else {
    alert('❌ Неверный логин или пароль');
  }
}

// ============================================================
//  WEBSOCKET
// ============================================================
function initSocket() {
  socket = io();
  socket.on('connect', () => {
    socket.emit('join', { userId: currentUser.id, username: currentUser.username });
  });

  socket.on('users', (users) => {
    const list = document.getElementById('users-list');
    list.innerHTML = users.filter(u => u.userId !== currentUser.id).map(u => `
      <div class="online-user" data-socketid="${u.socketId}" data-userid="${u.userId}" data-username="${u.username}">
        <div class="user-info"><span class="status-dot"></span>${u.username}</div>
        <button class="btn-call" onclick="startCall('${u.socketId}', '${u.username}')">📞</button>
      </div>
    `).join('');
  });

  socket.on('message', addMessage);
  socket.on('private-message', (data) => {
    if (isPrivateChat && (data.from_user === privateChatFriendId || data.to_user === privateChatFriendId)) {
      addPrivateMessage(data);
    }
  });
  socket.on('private-message-sent', (data) => {
    if (isPrivateChat) addPrivateMessage(data);
  });

  // ===== ГОЛОСОВЫЕ КАНАЛЫ =====
  socket.on('voice-users', (users) => {
    const count = users ? users.length : 0;
    document.getElementById('voice-controls').innerHTML = `
      <span style="color:var(--green);font-size:12px;">🟢 ${count} в голосовом</span>
      <button class="btn-voice active" onclick="toggleVoiceChannel()" style="background:var(--red);color:white;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:600;font-size:12px;">⏹ Выйти</button>
    `;
  });

  socket.on('voice-signal', async (data) => {
    if (peerConnection) {
      try {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(data.signal));
        if (data.signal.type === 'offer') {
          const answer = await peerConnection.createAnswer();
          await peerConnection.setLocalDescription(answer);
          socket.emit('voice-signal', { to: data.from, signal: answer });
        }
      } catch (e) { console.error('Voice signal error:', e); }
    }
  });

  // ===== ЛИЧНЫЕ ЗВОНКИ =====
  socket.on('incoming-call', (data) => {
    currentCallerId = data.from;
    currentCallerUsername = data.fromUsername || 'Неизвестный';
    showCallWindow('incoming');
  });

  socket.on('call-connected', (data) => {
    startTimer();
    showCallWindow('active');
  });

  socket.on('call-failed', (data) => {
    alert('❌ ' + (data.reason || 'Не удалось дозвониться'));
    endCall();
  });

  socket.on('call-ended', () => {
    endCall();
  });
}

// ============================================================
//  СЕРВЕРА
// ============================================================
async function loadServers() {
  const res = await fetch(`/servers/${currentUser.id}`);
  const servers = await res.json();
  document.getElementById('servers-list').innerHTML = servers.map(s => 
    `<div class="item" onclick="selectServer(${s.id})"># ${s.name}</div>`
  ).join('');
  if (servers.length) selectServer(servers[0].id);
}

async function createServer() {
  const name = prompt('📝 Название сервера:');
  if (!name) return;
  const res = await fetch('/servers', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, owner_id: currentUser.id })
  });
  const data = await res.json();
  alert(`✅ Сервер создан! 🔑 Код: ${data.invite_code}`);
  loadServers();
}

async function searchServers(query) {
  const container = document.getElementById('server-search-results');
  if (!query || query.length < 2) { container.innerHTML = ''; return; }
  const res = await fetch(`/servers/search/${encodeURIComponent(query)}`);
  const servers = await res.json();
  container.innerHTML = servers.map(s => `
    <div class="server-result" onclick="joinServerById(${s.id})"># ${s.name} <span style="color:var(--text-muted);font-size:11px;">(${s.invite_code})</span></div>
  `).join('');
}

async function joinServerById(serverId) {
  await fetch('/servers/join', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ invite_code: '', user_id: currentUser.id })
  });
  loadServers();
  document.getElementById('server-search-results').innerHTML = '';
}

async function joinServerByInvite() {
  const code = document.getElementById('invite-code').value.trim().toUpperCase();
  if (!code) return alert('Введите код приглашения');
  const res = await fetch('/servers/join', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ invite_code: code, user_id: currentUser.id })
  });
  if (res.ok) { alert('✅ Присоединился!'); loadServers(); document.getElementById('invite-code').value = ''; }
  else alert('❌ Неверный код');
}

async function selectServer(serverId) {
  isPrivateChat = false;
  privateChatFriendId = null;
  privateChatFriendName = null;
  
  currentServer = serverId;
  socket.emit('join-server', serverId);
  const res = await fetch(`/channels/${serverId}`);
  const channels = await res.json();
  const container = document.getElementById('servers-list');
  const channelDiv = document.createElement('div');
  channelDiv.id = 'channels-list';
  
  let html = '';
  channels.forEach(c => {
    const isVoice = c.is_voice === 1;
    const icon = isVoice ? '🎤' : '#';
    html += `<div class="item" onclick="${isVoice ? `joinVoiceChannel(${c.id}, ${serverId})` : `selectChannel(${c.id})`}">
      ${icon} ${c.name} ${isVoice ? '<span class="voice-user-count" id="voice-count-'+c.id+'">(0)</span>' : ''}
    </div>`;
  });
  
  const createBtn = document.createElement('div');
  createBtn.className = 'item';
  createBtn.innerHTML = '➕ Создать канал';
  createBtn.style.color = 'var(--text-muted)';
  createBtn.onclick = () => createChannel(serverId);
  
  channelDiv.innerHTML = html;
  channelDiv.appendChild(createBtn);
  
  const old = document.getElementById('channels-list');
  if (old) old.remove();
  container.after(channelDiv);
  
  const textChannels = channels.filter(c => c.is_voice === 0);
  if (textChannels.length) selectChannel(textChannels[0].id);
}

async function createChannel(serverId) {
  const name = prompt('📝 Название канала:');
  if (!name) return;
  const isVoice = confirm('Сделать голосовым? (OK - да, Отмена - текстовый)');
  await fetch('/channels', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, server_id: serverId, is_public: 1, is_voice: isVoice ? 1 : 0 })
  });
  selectServer(serverId);
}

async function selectChannel(channelId) {
  currentChannel = channelId;
  socket.emit('join-channel', channelId);
  document.getElementById('chat-title').innerHTML = `# канал ${channelId}`;
  const res = await fetch(`/messages/${channelId}`);
  const messages = await res.json();
  document.getElementById('messages').innerHTML = '';
  messages.forEach(addMessage);
}

// ============================================================
//  ГОЛОСОВЫЕ КАНАЛЫ
// ============================================================
async function joinVoiceChannel(channelId, serverId) {
  if (inVoiceChannel) {
    leaveVoiceChannel();
    return;
  }
  
  currentVoiceChannelId = channelId;
  inVoiceChannel = true;
  
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    setupVoiceDetection();
    
    socket.emit('join-voice-channel', {
      channelId,
      serverId,
      userId: currentUser.id,
      username: currentUser.username
    });
    
    // Создаем peer connection для голосового канала
    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    peerConnection = new RTCPeerConnection(config);
    
    localStream.getTracks().forEach(track => {
      peerConnection.addTrack(track, localStream);
    });
    
    peerConnection.ontrack = (event) => {
      if (event.streams && event.streams[0]) {
        const audio = new Audio();
        audio.srcObject = event.streams[0];
        audio.autoplay = true;
        audio.play().catch(e => console.log('Audio error:', e));
      }
    };
    
    peerConnection.onicecandidate = (event) => {
      if (event.candidate) {
        // Отправляем кандидаты всем в комнате
        socket.emit('voice-signal', { to: 'broadcast', signal: { candidate: event.candidate } });
      }
    };
    
    // Создаем offer
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    socket.emit('voice-signal', { to: 'broadcast', signal: offer });
    
    document.getElementById('voice-controls').innerHTML = `
      <span style="color:var(--green);font-size:12px;">🟢 В голосовом</span>
      <button class="btn-voice active" onclick="leaveVoiceChannel()" style="background:var(--red);color:white;border:none;padding:6px 14px;border-radius:8px;cursor:pointer;font-weight:600;font-size:12px;">⏹ Выйти</button>
    `;
    
  } catch (e) {
    alert('❌ Нет доступа к микрофону!');
    inVoiceChannel = false;
  }
}

function leaveVoiceChannel() {
  if (currentVoiceChannelId) {
    socket.emit('leave-voice-channel', {
      channelId: currentVoiceChannelId,
      userId: currentUser.id
    });
  }
  
  if (peerConnection) {
    peerConnection.close();
    peerConnection = null;
  }
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  if (audioContext) {
    audioContext.close();
    audioContext = null;
  }
  if (animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
  }
  
  inVoiceChannel = false;
  currentVoiceChannelId = null;
  
  document.getElementById('voice-controls').innerHTML = `
    <button class="btn-voice" onclick="toggleVoiceChannel()">🎤 Войти в голосовой</button>
  `;
  document.getElementById('my-voice-indicator').className = 'voice-indicator silent';
}

function toggleVoiceChannel() {
  if (inVoiceChannel) {
    leaveVoiceChannel();
  } else {
    // Находим голосовой канал на текущем сервере
    if (currentServer) {
      fetch(`/channels/${currentServer}`)
        .then(res => res.json())
        .then(channels => {
          const voiceChannel = channels.find(c => c.is_voice === 1);
          if (voiceChannel) {
            joinVoiceChannel(voiceChannel.id, currentServer);
          } else {
            alert('Нет голосового канала на этом сервере! Создайте его.');
          }
        });
    }
  }
}

// ============================================================
//  ДРУЗЬЯ
// ============================================================
async function searchUsers() {
  const q = document.getElementById('search-user').value.trim();
  if (!q || q.length < 2) { document.getElementById('search-results').innerHTML = ''; return; }
  const res = await fetch(`/users/search?q=${q}`);
  const users = await res.json();
  document.getElementById('search-results').innerHTML = users.map(u => `
    <div class="search-result">
      <span>${u.username}</span>
      <button class="add-btn" onclick="addFriend(${u.id})">➕</button>
    </div>
  `).join('');
}

async function addFriend(userId) {
  const res = await fetch('/friends/request', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id, friendId: userId })
  });
  if (res.ok) alert('✅ Заявка отправлена!');
  else alert('❌ Ошибка');
}

async function loadFriends() {
  const res = await fetch(`/friends/${currentUser.id}`);
  const friends = await res.json();
  const container = document.getElementById('friends-list');
  container.innerHTML = friends.map(f => `
    <div class="friend-item">
      <span>${f.username}</span>
      <div class="friend-actions">
        <button class="btn-chat" onclick="openPrivateChat(${f.id}, '${f.username}')">💬</button>
        <button class="btn-call" onclick="callFriendByName('${f.username}')">📞</button>
      </div>
    </div>
  `).join('');

  const reqRes = await fetch(`/friends/requests/${currentUser.id}`);
  const requests = await reqRes.json();
  if (requests.length > 0) {
    container.innerHTML += '<div style="margin-top:8px;border-top:1px solid var(--border);padding-top:8px;font-size:12px;color:var(--text-secondary);">📩 ЗАЯВКИ</div>';
    requests.forEach(r => {
      container.innerHTML += `
        <div class="friend-item">
          <span>${r.username}</span>
          <button onclick="acceptFriend(${r.id})" style="padding:2px 12px;border:none;border-radius:6px;background:var(--green);color:#0f0f1a;cursor:pointer;font-weight:700;">✅</button>
        </div>
      `;
    });
  }
}

async function acceptFriend(userId) {
  await fetch('/friends/accept', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ userId: currentUser.id, friendId: userId })
  });
  loadFriends();
}

function callFriendByName(username) {
  const users = document.querySelectorAll('#users-list .online-user');
  for (let el of users) {
    if (el.dataset.username === username) {
      startCall(el.dataset.socketid, username);
      return;
    }
  }
  alert(`${username} не в сети`);
}

// ============================================================
//  ЛИЧНЫЙ ЧАТ
// ============================================================
async function openPrivateChat(friendId, friendName) {
  isPrivateChat = true;
  privateChatFriendId = friendId;
  privateChatFriendName = friendName;
  
  document.getElementById('chat-title').innerHTML = `💬 ${friendName} <span class="private-badge">🔒 Личный чат</span>`;
  document.getElementById('messages').innerHTML = '';
  
  const res = await fetch(`/private/messages/${currentUser.id}/${friendId}`);
  const messages = await res.json();
  messages.forEach(msg => addPrivateMessage(msg));
}

function addPrivateMessage(msg) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message';
  const isMine = msg.from_user === currentUser.id;
  if (isMine) div.classList.add('own');
  div.innerHTML = `
    <span class="msg-user">${isMine ? 'Ты' : privateChatFriendName}</span>
    <span class="msg-time">${new Date(msg.timestamp).toLocaleTimeString()}</span>
    <div class="msg-text">${msg.content}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function addMessage(msg) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'message';
  const isMine = msg.user_id === currentUser.id;
  if (isMine) div.classList.add('own');
  div.innerHTML = `
    <span class="msg-user">${msg.username}</span>
    <span class="msg-time">${new Date(msg.timestamp).toLocaleTimeString()}</span>
    <div class="msg-text">${msg.content}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function sendMessage() {
  const input = document.getElementById('message-input');
  const content = input.value.trim();
  if (!content) return;
  
  if (isPrivateChat && privateChatFriendId) {
    const users = document.querySelectorAll('#users-list .online-user');
    let targetSocketId = null;
    for (let el of users) {
      if (parseInt(el.dataset.userid) === privateChatFriendId) {
        targetSocketId = el.dataset.socketid;
        break;
      }
    }
    
    socket.emit('private-message', {
      from_user: currentUser.id,
      to_user: privateChatFriendId,
      content,
      to_socket_id: targetSocketId
    });
    
    addPrivateMessage({ from_user: currentUser.id, content, timestamp: new Date().toISOString() });
    input.value = '';
    return;
  }
  
  if (!currentChannel) return;
  socket.emit('message', { channelId: currentChannel, userId: currentUser.id, content });
  input.value = '';
}

// ============================================================
//  ЛИЧНЫЕ ЗВОНКИ (ПРОСТАЯ И НАДЁЖНАЯ ВЕРСИЯ)
// ============================================================
async function startCall(socketId, username) {
  if (callInProgress) { alert('Уже в звонке!'); return; }
  if (socketId === socket.id) { alert('Это ты!'); return; }

  currentCallerId = socketId;
  currentCallerUsername = username;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    setupVoiceDetection();

    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    peerConnection = new RTCPeerConnection(config);

    localStream.getTracks().forEach(track => {
      peerConnection.addTrack(track, localStream);
    });

    peerConnection.ontrack = (event) => {
      if (event.streams && event.streams[0]) {
        const audio = new Audio();
        audio.srcObject = event.streams[0];
        audio.autoplay = true;
        audio.play().catch(e => console.log('Audio error:', e));
      }
    };

    peerConnection.onicecandidate = (event) => {
      if (event.candidate) {
        socket.emit('voice-signal', { to: socketId, signal: { candidate: event.candidate } });
      }
    };

    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);

    socket.emit('voice-signal', { to: socketId, signal: offer });
    socket.emit('call-user', { to: socketId, fromUsername: currentUser.username });

    callInProgress = true;
    showCallWindow('outgoing');
  } catch (e) {
    alert('❌ Нет доступа к микрофону!');
    endCall();
  }
}

async function acceptCall() {
  if (!currentCallerId) return;
  if (callInProgress) return;

  try {
    if (!localStream) {
      localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      setupVoiceDetection();
    }

    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    peerConnection = new RTCPeerConnection(config);

    localStream.getTracks().forEach(track => {
      peerConnection.addTrack(track, localStream);
    });

    peerConnection.ontrack = (event) => {
      if (event.streams && event.streams[0]) {
        const audio = new Audio();
        audio.srcObject = event.streams[0];
        audio.autoplay = true;
        audio.play().catch(e => console.log('Audio error:', e));
      }
    };

    peerConnection.onicecandidate = (event) => {
      if (event.candidate) {
        socket.emit('voice-signal', { to: currentCallerId, signal: { candidate: event.candidate } });
      }
    };

    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);

    socket.emit('voice-signal', { to: currentCallerId, signal: answer });
    socket.emit('call-accepted', { to: currentCallerId });

    callInProgress = true;
    startTimer();
    showCallWindow('active');
  } catch (e) {
    alert('❌ Ошибка: ' + e.message);
    endCall();
  }
}

function rejectCall() {
  if (currentCallerId) {
    socket.emit('call-rejected', { to: currentCallerId });
  }
  endCall();
}

function cancelCall() {
  if (currentCallerId) {
    socket.emit('call-end', { to: currentCallerId });
  }
  endCall();
}

function endCall() {
  if (peerConnection) {
    peerConnection.close();
    peerConnection = null;
  }
  if (localStream && !inVoiceChannel) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  if (audioContext && !inVoiceChannel) {
    audioContext.close();
    audioContext = null;
  }
  if (animationId) {
    cancelAnimationFrame(animationId);
    animationId = null;
  }
  if (callTimerInterval) {
    clearInterval(callTimerInterval);
    callTimerInterval = null;
  }
  callInProgress = false;
  callSeconds = 0;
  document.getElementById('call-overlay').classList.remove('active');
  document.getElementById('my-voice-indicator').className = 'voice-indicator silent';
  document.getElementById('their-voice-indicator').className = 'voice-indicator silent';
  currentCallerId = null;
}

function toggleMute() {
  isMuted = !isMuted;
  if (localStream) {
    localStream.getAudioTracks().forEach(track => {
      track.enabled = !isMuted;
    });
  }
  const muteBtn = document.querySelector('.btn-mute');
  if (muteBtn) {
    muteBtn.textContent = isMuted ? '🔇 Без звука' : '🎙️ Вкл. звук';
  }
}

function startTimer() {
  callSeconds = 0;
  if (callTimerInterval) clearInterval(callTimerInterval);
  callTimerInterval = setInterval(() => {
    callSeconds++;
    const mins = String(Math.floor(callSeconds / 60)).padStart(2, '0');
    const secs = String(callSeconds % 60).padStart(2, '0');
    document.getElementById('call-timer').textContent = `${mins}:${secs}`;
  }, 1000);
}

function setupVoiceDetection() {
  if (!localStream) return;
  if (audioContext) audioContext.close();
  audioContext = new AudioContext();
  const source = audioContext.createMediaStreamSource(localStream);
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;
  source.connect(analyser);
  dataArray = new Uint8Array(analyser.fftSize);
  detectVoice();
}

function detectVoice() {
  if (!analyser) return;
  analyser.getByteTimeDomainData(dataArray);
  let sum = 0;
  for (let i = 0; i < dataArray.length; i++) {
    const value = (dataArray[i] - 128) / 128;
    sum += value * value;
  }
  const rms = Math.sqrt(sum / dataArray.length);
  const isSpeaking = rms > 0.015;

  const indicator = document.getElementById('my-voice-indicator');
  indicator.className = isSpeaking ? 'voice-indicator speaking' : 'voice-indicator silent';

  animationId = requestAnimationFrame(detectVoice);
}

// ============================================================
//  UI ЗВОНКА
// ============================================================
function showCallWindow(type) {
  const overlay = document.getElementById('call-overlay');
  const nameEl = document.getElementById('caller-name');
  const statusEl = document.getElementById('call-status');
  const avatarEl = document.getElementById('caller-avatar');
  const buttonsEl = document.getElementById('call-buttons');
  const timerEl = document.getElementById('call-timer');

  overlay.classList.add('active');

  if (currentCallerUsername) {
    nameEl.textContent = currentCallerUsername;
    avatarEl.textContent = currentCallerUsername.charAt(0).toUpperCase();
  }

  if (type === 'incoming') {
    statusEl.textContent = '📞 Входящий звонок...';
    timerEl.textContent = '00:00';
    buttonsEl.innerHTML = `
      <button class="btn-accept" onclick="acceptCall()">📞 Принять</button>
      <button class="btn-reject" onclick="rejectCall()">❌ Отклонить</button>
    `;
  } else if (type === 'outgoing') {
    statusEl.textContent = '📤 Исходящий звонок...';
    timerEl.textContent = '00:00';
    buttonsEl.innerHTML = `
      <button class="btn-cancel" onclick="cancelCall()">❌ Отменить</button>
    `;
  } else if (type === 'active') {
    statusEl.textContent = '🟢 В разговоре';
    buttonsEl.innerHTML = `
      <button class="btn-mute" onclick="toggleMute()">🎙️ Вкл. звук</button>
      <button class="btn-end" onclick="endCall()">📴 Завершить</button>
    `;
  }
}
