<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💬 Discord Clone – Полный фарш</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', system-ui, sans-serif; }
        
        :root {
            --bg-primary:#0f0f1a;
            --bg-secondary:#1a1a2e;
            --bg-sidebar:#141424;
            --bg-hover:#2a2a4a;
            --bg-active:#3a3a6a;
            --text-primary:#e8e8f0;
            --text-secondary:#a0a0c0;
            --text-muted:#6a6a8a;
            --accent:#6c5ce7;
            --green:#00d4a0;
            --red:#ff6b6b;
            --border:#2a2a4a;
            --yellow:#fdcb6e;
        }

        body { display:flex; height:100vh; background:var(--bg-primary); color:var(--text-primary); overflow:hidden; }

        #auth {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            display:flex; justify-content:center; align-items:center; z-index:10000;
        }
        #auth.hidden { display:none; }

        .auth-box {
            background:var(--bg-secondary); padding:40px; border-radius:20px;
            border:1px solid var(--border); min-width:380px; box-shadow:0 20px 60px rgba(0,0,0,0.5);
        }
        .auth-box h2 { font-size:32px; margin-bottom:4px; color:var(--accent); text-align:center; }
        .auth-box .subtitle { color:var(--text-secondary); font-size:14px; text-align:center; margin-bottom:24px; }
        .auth-box input {
            width:100%; padding:14px 18px; border-radius:12px; border:2px solid var(--border);
            background:var(--bg-primary); color:var(--text-primary); margin-bottom:16px; font-size:15px;
        }
        .auth-box input:focus { outline:none; border-color:var(--accent); }
        .auth-box .btn-primary {
            width:100%; padding:14px; background:linear-gradient(135deg, var(--accent), #8b7cf7);
            border:none; border-radius:12px; color:white; font-weight:700; font-size:16px; cursor:pointer;
        }
        .hidden { display:none!important; }

        #app { display:none; width:100%; height:100vh; }
        #app.active { display:flex; }

        .sidebar {
            width:300px; min-width:300px; background:var(--bg-sidebar);
            padding:16px 12px; overflow-y:auto; border-right:1px solid var(--border);
            display:flex; flex-direction:column; gap:8px;
        }
        .sidebar .logo { font-size:24px; font-weight:800; padding:8px 12px; color:var(--accent); }
        .sidebar .section-title { color:var(--text-muted); font-size:11px; font-weight:700; text-transform:uppercase; margin:12px 0 4px; }
        .sidebar .item {
            padding:10px 14px; border-radius:10px; cursor:pointer; color:var(--text-secondary); font-size:14px;
        }
        .sidebar .item:hover { background:var(--bg-hover); color:var(--text-primary); }
        .sidebar .item.active { background:var(--bg-active); color:white; }

        .online-user {
            padding:8px 12px; border-radius:10px; display:flex; justify-content:space-between; align-items:center;
        }
        .online-user:hover { background:var(--bg-hover); }
        .online-user .status-dot { width:10px; height:10px; border-radius:50%; background:var(--green); }

        .friend-item {
            display:flex; justify-content:space-between; align-items:center; padding:8px 12px; border-radius:10px;
        }
        .friend-item:hover { background:var(--bg-hover); }
        .friend-status.online { background:rgba(0,212,160,0.2); color:var(--green); padding:2px 8px; border-radius:10px; font-size:10px; }
        .friend-status.offline { background:var(--bg-active); color:var(--text-muted); padding:2px 8px; border-radius:10px; font-size:10px; }

        .chat { flex:1; display:flex; flex-direction:column; background:var(--bg-primary); }
        .chat-header {
            padding:14px 24px; border-bottom:1px solid var(--border); background:var(--bg-secondary);
            display:flex; justify-content:space-between; align-items:center;
        }
        .chat-title { font-size:18px; font-weight:700; }

        .messages { flex:1; padding:20px 24px; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
        .message {
            padding:8px 16px; background:var(--bg-secondary); border-radius:12px; max-width:70%;
        }
        .message.own { align-self:flex-end; background:var(--bg-active); }
        .message .msg-user { font-weight:700; color:var(--accent); font-size:12px; }
        .message .msg-text { font-size:14px; margin-top:2px; }

        .input-area {
            padding:14px 24px; border-top:1px solid var(--border); background:var(--bg-secondary);
            display:flex; gap:10px; align-items:center; position:relative;
        }
        .input-area input {
            flex:1; padding:12px 18px; border-radius:12px; border:2px solid var(--border);
            background:var(--bg-primary); color:var(--text-primary); font-size:14px;
        }
        .input-area input:focus { outline:none; border-color:var(--accent); }
        .emoji-btn { background:transparent; border:none; font-size:26px; cursor:pointer; }
        .emoji-picker {
            display:none; position:absolute; bottom:80px; right:120px;
            background:var(--bg-secondary); border:1px solid var(--border); border-radius:16px;
            padding:14px; z-index:100; grid-template-columns:repeat(10,1fr); gap:6px;
        }
        .emoji-picker.show { display:grid; }
        .emoji-picker span { font-size:28px; cursor:pointer; padding:6px; border-radius:8px; }
        .emoji-picker span:hover { background:var(--bg-hover); }

        #call-overlay {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.85); backdrop-filter:blur(8px);
            display:none; justify-content:center; align-items:center; z-index:9999;
        }
        #call-overlay.active { display:flex; }
        #call-window {
            background:var(--bg-secondary); border-radius:24px; padding:48px;
            text-align:center; min-width:420px; border:1px solid var(--border);
        }
        .caller-avatar { font-size:90px; display:block; width:140px; height:140px; line-height:140px; border-radius:50%; background:var(--bg-active); margin:0 auto 20px; font-weight:700; border:4px solid var(--accent); }
        .caller-name { font-size:28px; font-weight:700; margin-bottom:8px; }
        .call-timer { font-size:36px; font-weight:700; color:var(--green); margin-bottom:20px; }
        .call-buttons { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
        .call-buttons button { padding:14px 32px; border:none; border-radius:50px; font-size:15px; font-weight:700; cursor:pointer; min-width:150px; }
        .btn-accept { background:var(--green); color:#0f0f1a; }
        .btn-reject { background:var(--red); color:white; }
        .btn-end { background:var(--red); color:white; }
        .btn-mute { background:var(--bg-hover); color:var(--text-primary); border:2px solid var(--border)!important; }
        .btn-mute.muted { background:var(--red); color:white; border-color:var(--red)!important; }

        .voice-indicator { display:inline-block; width:16px; height:16px; border-radius:50%; margin:0 8px; }
        .voice-indicator.speaking { background:var(--green); animation:pulse 0.5s infinite alternate; }
        .voice-indicator.silent { background:var(--text-muted); }
        @keyframes pulse { 0%{opacity:0.6; transform:scale(0.8);} 100%{opacity:1; transform:scale(1.4);} }

        .typing-indicator {
            display:none; align-items:center; gap:6px; font-size:12px; color:var(--green);
            padding:4px 14px; background:rgba(0,212,160,0.1); border-radius:20px; margin-left:12px;
        }
        .typing-indicator.active { display:inline-flex; }
        .typing-dots span { display:inline-block; width:5px; height:5px; background:var(--green); border-radius:50%; animation:typingBounce 1.4s infinite; }
        .typing-dots span:nth-child(2){animation-delay:0.2s;} .typing-dots span:nth-child(3){animation-delay:0.4s;}
        @keyframes typingBounce { 0%,80%,100%{transform:translateY(0);} 40%{transform:translateY(-8px);} }
    </style>
</head>
<body>

<div id="auth">
    <div class="auth-box" id="login">
        <h2>💬 Discord Clone</h2>
        <p class="subtitle">Общайся с друзьями в реальном времени</p>
        <input id="login-username" placeholder="👤 Имя пользователя" />
        <input id="login-password" type="password" placeholder="🔒 Пароль" />
        <button class="btn-primary" onclick="login()">🚀 Войти</button>
        <span style="display:block;text-align:center;margin-top:16px;color:var(--text-secondary);">
            Нет аккаунта? <a onclick="showRegister()" style="color:var(--accent);cursor:pointer;">Зарегистрироваться</a>
        </span>
    </div>
    <div class="auth-box hidden" id="register">
        <h2>💬 Discord Clone</h2>
        <p class="subtitle">Создай аккаунт и начни общение</p>
        <input id="reg-username" placeholder="👤 Придумай имя" />
        <input id="reg-password" type="password" placeholder="🔒 Придумай пароль" />
        <button class="btn-primary" onclick="register()">🎉 Зарегистрироваться</button>
        <span style="display:block;text-align:center;margin-top:16px;color:var(--text-secondary);">
            Уже есть аккаунт? <a onclick="showLogin()" style="color:var(--accent);cursor:pointer;">Войти</a>
        </span>
    </div>
</div>

<div id="app">
    <div class="sidebar">
        <div class="logo">💬 Discord Clone</div>
        <div class="section-title">📡 Сервера</div>
        <div id="servers-list"></div>
        <div style="display:flex;gap:6px;">
            <input id="server-search" placeholder="🔍 Поиск..." style="flex:1;padding:8px;border-radius:10px;border:1px solid var(--border);background:var(--bg-primary);color:white;" oninput="searchServers(this.value)" />
        </div>
        <div id="server-search-results"></div>
        <button onclick="createServer()" style="padding:10px;border-radius:10px;border:2px dashed var(--border);background:transparent;color:var(--text-muted);cursor:pointer;width:100%;">➕ Создать сервер</button>
        <div class="section-title">👥 Друзья</div>
        <div id="friends-list"></div>
        <div class="section-title">🟢 Онлайн</div>
        <div id="users-list"></div>
    </div>

    <div class="chat">
        <div class="chat-header">
            <div style="display:flex; align-items:center;">
                <span class="chat-title" id="chat-title"># general</span>
                <span class="typing-indicator" id="typing-indicator">
                    <span id="typing-username"></span> печатает
                    <span class="typing-dots"><span></span><span></span><span></span></span>
                </span>
            </div>
            <div id="voice-controls"></div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input id="message-input" placeholder="💬 Напиши сообщение..." oninput="handleTyping()" />
            <button class="emoji-btn" onclick="toggleEmojiPicker()">😀</button>
            <button class="btn-primary" onclick="sendMessage()" style="padding:12px 24px;">Отправить</button>
            <div class="emoji-picker" id="emoji-picker"></div>
        </div>
    </div>
</div>

<div id="call-overlay">
    <div id="call-window">
        <div class="caller-avatar" id="caller-avatar">👤</div>
        <div class="caller-name" id="caller-name">Имя <span class="voice-indicator silent" id="call-voice-indicator"></span></div>
        <div class="call-timer" id="call-timer">00:00</div>
        <div class="call-buttons" id="call-buttons"></div>
    </div>
</div>

<audio id="remoteAudio" autoplay></audio>

<script>
// ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
let socket, currentUser, currentChannel, currentServer;
let localStream = null;
let peerConnection = null;
let callInProgress = false;
let currentCallerId = null;
let currentCallerUsername = null;
let isMuted = false;
let isPrivateChat = false;
let privateChatFriendId = null;
let callTimerInterval = null;
let callSeconds = 0;
let typingTimeout = null;

// ========== ЭМОДЗИ ==========
const EMOJI_LIST = ['😀','😂','😍','😎','🤔','😢','😡','👍','🎉','🔥','❤️','💬','📞','🎤','🔊','✅','❌','👋','💻','📱'];

function toggleEmojiPicker() {
    const picker = document.getElementById('emoji-picker');
    if (picker.classList.contains('show')) { picker.classList.remove('show'); return; }
    picker.innerHTML = EMOJI_LIST.map(e => `<span onclick="insertEmoji('${e}')">${e}</span>`).join('');
    picker.classList.add('show');
}
function insertEmoji(emoji) {
    const input = document.getElementById('message-input');
    input.value += emoji; input.focus();
    document.getElementById('emoji-picker').classList.remove('show');
}

// ========== АВТОРИЗАЦИЯ ==========
function showRegister(){ document.getElementById('login').classList.add('hidden'); document.getElementById('register').classList.remove('hidden'); }
function showLogin(){ document.getElementById('register').classList.add('hidden'); document.getElementById('login').classList.remove('hidden'); }

async function register() {
    const u = document.getElementById('reg-username').value.trim(), p = document.getElementById('reg-password').value;
    if(!u||!p) return alert('Заполни все поля!');
    const res = await fetch('/register', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    if(res.ok){ alert('✅ Зарегистрирован!'); showLogin(); } else alert('❌ Ошибка');
}

async function login() {
    const u = document.getElementById('login-username').value.trim(), p = document.getElementById('login-password').value;
    if(!u||!p) return alert('Введи логин и пароль!');
    const res = await fetch('/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const data = await res.json();
    if(data.token) {
        currentUser = data.user;
        document.getElementById('auth').classList.add('hidden');
        document.getElementById('app').classList.add('active');
        initSocket(); loadServers(); loadFriends();
    } else alert('❌ Неверный логин или пароль');
}

// ========== SOCKET ==========
function initSocket() {
    socket = io();
    socket.on('connect', () => socket.emit('join', {userId:currentUser.id, username:currentUser.username}));
    socket.on('users', (users) => {
        document.getElementById('users-list').innerHTML = users.filter(u => u.userId !== currentUser.id).map(u => 
            `<div class="online-user"><span>🟢 ${u.username}</span><button onclick="startCall('${u.socketId}','${u.username}')">📞</button></div>`
        ).join('');
    });
    socket.on('message', addMessage);
    socket.on('user-typing', ({username}) => { document.getElementById('typing-username').textContent = username; document.getElementById('typing-indicator').classList.add('active'); });
    socket.on('user-stop-typing', () => document.getElementById('typing-indicator').classList.remove('active'));

    // Исправленная логика звонков (Offer/Answer через сервер)
    socket.on('webrtc-offer', async (offer) => {
        if (!callInProgress && currentCallerId) {
            await handleIncomingOffer(offer);
        }
    });
    socket.on('webrtc-answer', async (answer) => {
        if (peerConnection) {
            await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        }
    });
    socket.on('webrtc-candidate', async (candidate) => {
        if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
    });

    // Сигналы для UI (звонок/отбой)
    socket.on('incoming-call', (data) => {
        currentCallerId = data.from; currentCallerUsername = data.fromUsername;
        playRingtone(); showCallWindow('incoming');
    });
    socket.on('call-connected', () => { stopRingtone(); startTimer(); showCallWindow('active'); });
    socket.on('call-ended', () => { stopRingtone(); endCall(); });
    socket.on('call-rejected', () => { stopRingtone(); endCall(); });
}

// ========== СЕРВЕРА / КАНАЛЫ ==========
async function loadServers() {
    const res = await fetch(`/servers/${currentUser.id}`); const servers = await res.json();
    document.getElementById('servers-list').innerHTML = servers.map(s => `<div class="item" onclick="selectServer(${s.id})"># ${s.name}</div>`).join('');
    if(servers.length) selectServer(servers[0].id);
}
async function createServer() {
    const name = prompt('Название сервера:'); if(!name) return;
    await fetch('/servers', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,owner_id:currentUser.id})});
    loadServers();
}
async function selectServer(serverId) {
    currentServer = serverId; socket.emit('join-server', serverId);
    const res = await fetch(`/channels/${serverId}`); const channels = await res.json();
    const old = document.getElementById('channels-list'); if(old) old.remove();
    const div = document.createElement('div'); div.id = 'channels-list';
    div.innerHTML = channels.map(c => `<div class="item" onclick="selectChannel(${c.id})">${c.is_voice?'🔊':'#'} ${c.name}</div>`).join('');
    document.getElementById('servers-list').after(div);
    const textCh = channels.filter(c => !c.is_voice);
    if(textCh.length) selectChannel(textCh[0].id);
}
async function selectChannel(channelId) {
    currentChannel = channelId; socket.emit('join-channel', channelId);
    document.getElementById('chat-title').innerHTML = '# Канал';
    const res = await fetch(`/messages/${channelId}`); const msgs = await res.json();
    document.getElementById('messages').innerHTML = ''; msgs.forEach(addMessage);
}
function addMessage(msg) {
    const div = document.createElement('div'); div.className = 'message' + (msg.user_id===currentUser.id?' own':'');
    div.innerHTML = `<span class="msg-user">${msg.username}</span><div class="msg-text">${msg.content}</div>`;
    document.getElementById('messages').appendChild(div);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
}
function sendMessage() {
    const content = document.getElementById('message-input').value.trim(); if(!content) return;
    socket.emit('message', {channelId:currentChannel, userId:currentUser.id, content});
    document.getElementById('message-input').value = '';
}
async function loadFriends() {
    const res = await fetch(`/friends/${currentUser.id}`); const friends = await res.json();
    document.getElementById('friends-list').innerHTML = friends.map(f => `
        <div class="friend-item"><span>${f.username}</span>
        <span class="friend-status ${f.is_online?'online':'offline'}">${f.is_online?'В сети':'Не в сети'}</span>
        ${f.is_online?`<button onclick="callFriendByName('${f.username}')">📞</button>`:''}
        </div>`).join('');
}
function callFriendByName(name) {
    const users = document.querySelectorAll('#users-list .online-user');
    for(let el of users) if(el.textContent.includes(name)) { startCall(el.querySelector('button').getAttribute('onclick').match(/'([^']+)'/)[1], name); return; }
}

// ========== ИСПРАВЛЕННЫЕ ЗВОНКИ (WebRTC) ==========
function playRingtone() { /* ... (мелодии можно вставить позже) ... */ }
function stopRingtone() {}

async function startCall(socketId, username) {
    if(callInProgress) return alert('Уже звонок!');
    currentCallerId = socketId; currentCallerUsername = username;
    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        socket.emit('call-user', {to:socketId, fromUsername:currentUser.username});
        callInProgress = true;
        showCallWindow('outgoing');
    } catch(e) { alert('Нет микрофона'); endCall(); }
}

async function acceptCall() {
    if(!currentCallerId) return;
    stopRingtone();
    if(!localStream) localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    socket.emit('call-accept', {to:currentCallerId});
    
    // Создаём PeerConnection и отправляем Offer
    await createPeerConnection();
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    socket.emit('webrtc-offer', offer);
    
    startTimer(); showCallWindow('active');
}

async function handleIncomingOffer(offer) {
    await createPeerConnection();
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    socket.emit('webrtc-answer', answer);
}

async function createPeerConnection() {
    if(peerConnection) peerConnection.close();
    peerConnection = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] });
    
    if(localStream) localStream.getTracks().forEach(t => peerConnection.addTrack(t, localStream));
    
    peerConnection.ontrack = (event) => {
        console.log('🎵 Получен аудиопоток');
        if(event.streams[0]) {
            const remoteAudio = document.getElementById('remoteAudio');
            remoteAudio.srcObject = event.streams[0];
            remoteAudio.play().catch(e => console.log('Нажми на страницу для звука'));
        }
    };
    
    peerConnection.onicecandidate = (e) => {
        if(e.candidate) socket.emit('webrtc-candidate', e.candidate);
    };
}

function rejectCall() { socket.emit('call-reject', {to:currentCallerId}); endCall(); }
function cancelCall() { socket.emit('call-end', {to:currentCallerId}); endCall(); }

function endCall() {
    if(peerConnection) { peerConnection.close(); peerConnection = null; }
    if(localStream && !document.querySelector('#voice-controls').innerText.includes('Выйти')) {
        localStream.getTracks().forEach(t => t.stop()); localStream = null;
    }
    if(callTimerInterval) clearInterval(callTimerInterval);
    callInProgress = false; callSeconds = 0;
    document.getElementById('call-overlay').classList.remove('active');
}

function toggleCallMute() {
    isMuted = !isMuted;
    if(localStream) localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
    const btn = document.querySelector('.btn-mute');
    if(btn) { btn.textContent = isMuted ? '🔇 Вкл.микрофон' : '🎙️ Выкл.микрофон'; btn.classList.toggle('muted', isMuted); }
}

function startTimer() {
    callSeconds = 0;
    callTimerInterval = setInterval(() => {
        callSeconds++;
        const m = String(Math.floor(callSeconds/60)).padStart(2,'0');
        const s = String(callSeconds%60).padStart(2,'0');
        document.getElementById('call-timer').textContent = `${m}:${s}`;
    }, 1000);
}

function showCallWindow(type) {
    document.getElementById('call-overlay').classList.add('active');
    document.getElementById('caller-name').innerHTML = (currentCallerUsername||'Неизвестный') + ' <span class="voice-indicator silent" id="call-voice-indicator"></span>';
    document.getElementById('caller-avatar').textContent = (currentCallerUsername||'?')[0].toUpperCase();
    const buttons = document.getElementById('call-buttons');
    if(type==='incoming') buttons.innerHTML = '<button class="btn-accept" onclick="acceptCall()">📞 Принять</button><button class="btn-reject" onclick="rejectCall()">❌ Отклонить</button>';
    else if(type==='outgoing') buttons.innerHTML = '<button class="btn-reject" onclick="cancelCall()">❌ Отменить</button>';
    else if(type==='active') buttons.innerHTML = '<button class="btn-mute" onclick="toggleCallMute()">🎙️ Выкл.микрофон</button><button class="btn-end" onclick="endCall()">📴 Завершить</button>';
}

// ========== ИНДИКАТОР ПЕЧАТАЕТ ==========
function handleTyping() {
    if(document.getElementById('message-input').value.trim()==='') return;
    if(typingTimeout) clearTimeout(typingTimeout);
    socket.emit('typing-start', {channelId:currentChannel, username:currentUser.username});
    typingTimeout = setTimeout(() => socket.emit('typing-stop', {channelId:currentChannel}), 2000);
}
</script>
