<!DOCTYPE html>
<html>
<head>
  <title>Discord Clone</title>
  <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { display: flex; height: 100vh; background: #1e1e2e; color: #cdd6f4; }
    
    #login, #register { display: flex; flex-direction: column; gap: 10px; margin: auto; padding: 40px; background: #313244; border-radius: 12px; min-width: 300px; }
    #login input, #register input { padding: 10px; border: none; border-radius: 6px; background: #45475a; color: #cdd6f4; }
    #login button, #register button { padding: 10px; background: #89b4fa; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: #1e1e2e; }
    .remember-me { display: flex; align-items: center; gap: 8px; color: #a6adc8; font-size: 14px; }
    .remember-me input { width: 16px; height: 16px; cursor: pointer; }
    
    #app { display: none; width: 100%; }
    .sidebar { width: 280px; background: #1e1e2e; padding: 15px; border-right: 1px solid #313244; overflow-y: auto; flex-shrink: 0; }
    .sidebar h3 { color: #a6adc8; font-size: 14px; margin: 15px 0 5px; }
    .sidebar .item { padding: 8px 12px; border-radius: 6px; cursor: pointer; margin: 2px 0; }
    .sidebar .item:hover { background: #313244; }
    .sidebar .item.active { background: #45475a; }
    
    .chat { flex: 1; display: flex; flex-direction: column; background: #181825; min-width: 0; }
    .chat-header { padding: 15px; border-bottom: 1px solid #313244; font-weight: bold; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
    .message { padding: 6px 12px; background: #313244; border-radius: 8px; max-width: 80%; word-wrap: break-word; }
    .message .user { font-weight: bold; color: #89b4fa; }
    .message .time { font-size: 10px; color: #6c7086; margin-left: 10px; }
    .input-area { display: flex; padding: 15px; gap: 10px; border-top: 1px solid #313244; }
    .input-area input { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #313244; color: #cdd6f4; min-width: 0; }
    .input-area button { padding: 10px 20px; background: #89b4fa; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: #1e1e2e; white-space: nowrap; }
    
    .online-user { padding: 4px 8px; font-size: 13px; color: #a6adc8; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .online-user:hover { background: #313244; border-radius: 4px; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .status-dot.online { background: #a6e3a1; }
    
    .btn-call { background: #a6e3a1; border: none; padding: 2px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
    .btn-call:hover { background: #89b4fa; }
    .friend-item { display: flex; justify-content: space-between; align-items: center; padding: 4px 8px; }
    .friend-item .btn-chat { background: #89b4fa; border: none; padding: 2px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .friend-item .btn-chat:hover { background: #a6adc8; }
    
    .server-search { display: flex; gap: 5px; margin-top: 5px; }
    .server-search input { flex: 1; padding: 6px; border-radius: 6px; border: none; background: #45475a; color: #cdd6f4; }
    .server-search button { padding: 6px 12px; background: #89b4fa; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .server-search button:hover { background: #a6adc8; }
    .invite-input { display: flex; gap: 5px; margin-top: 5px; }
    .invite-input input { flex: 1; padding: 6px; border-radius: 6px; border: none; background: #45475a; color: #cdd6f4; }
    .invite-input button { padding: 6px 12px; background: #a6e3a1; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    
    .private-chat-indicator { color: #a6e3a1; font-size: 12px; margin-left: 5px; }
    
    /* ОКНО ЗВОНКА */
    #call-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      display: none; justify-content: center; align-items: center;
      z-index: 9999;
    }
    #call-overlay.active { display: flex; }
    
    #call-window {
      background: #313244;
      border-radius: 16px;
      padding: 40px 50px;
      text-align: center;
      min-width: 350px;
      max-width: 90%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.8);
      border: 1px solid #45475a;
    }
    #call-window .caller-avatar { font-size: 64px; margin-bottom: 10px; }
    #call-window .caller-name { font-size: 24px; font-weight: bold; margin-bottom: 5px; }
    #call-window .call-status { font-size: 14px; color: #a6adc8; margin-bottom: 25px; }
    #call-window .call-timer { font-size: 32px; font-weight: bold; color: #89b4fa; margin-bottom: 20px; font-variant-numeric: tabular-nums; }
    #call-window .call-buttons { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    #call-window .call-buttons button { padding: 14px 28px; border: none; border-radius: 50px; font-size: 16px; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
    #call-window .call-buttons button:hover { transform: scale(1.05); }
    .btn-accept { background: #a6e3a1; color: #1e1e2e; }
    .btn-reject { background: #f38ba8; color: #1e1e2e; }
    .btn-end { background: #f38ba8; color: #1e1e2e; }
    .btn-mute { background: #45475a; color: #cdd6f4; }
    .btn-cancel { background: #f9e2af; color: #1e1e2e; }
    
    .voice-indicator { display: inline-block; width: 14px; height: 14px; border-radius: 50%; margin-left: 8px; transition: all 0.1s; vertical-align: middle; }
    .voice-indicator.speaking { background: #a6e3a1; box-shadow: 0 0 20px #a6e3a1; animation: pulse 0.3s infinite; }
    .voice-indicator.silent { background: #6c7086; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    
    .hidden { display: none; }
    .mt-10 { margin-top: 10px; }
    .flex { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    
    .server-result { padding: 6px 12px; cursor: pointer; border-radius: 4px; margin: 2px 0; }
    .server-result:hover { background: #313244; }
    
    @media (max-width: 768px) {
      .sidebar { width: 200px; padding: 10px; }
      #call-window { padding: 20px; min-width: auto; }
      #call-window .call-buttons button { padding: 10px 16px; font-size: 14px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="auth">
  <div id="login">
    <h2>Вход</h2>
    <input id="login-username" placeholder="Имя пользователя" />
    <input id="login-password" type="password" placeholder="Пароль" />
    <div class="remember-me">
      <input type="checkbox" id="remember-me" checked />
      <label for="remember-me">Запомнить меня</label>
    </div>
    <button onclick="login()">Войти</button>
    <span>Нет аккаунта? <a href="#" onclick="showRegister()">Зарегистрироваться</a></span>
  </div>
  <div id="register" class="hidden">
    <h2>Регистрация</h2>
    <input id="reg-username" placeholder="Имя пользователя" />
    <input id="reg-password" type="password" placeholder="Пароль" />
    <button onclick="register()">Зарегистрироваться</button>
    <span>Уже есть аккаунт? <a href="#" onclick="showLogin()">Войти</a></span>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar">
    <h3>📡 Сервера</h3>
    <div id="servers-list"></div>
    
    <div class="server-search">
      <input id="server-search-input" placeholder="Поиск серверов..." oninput="searchServers(this.value)" />
      <button onclick="searchServers(document.getElementById('server-search-input').value)">🔍</button>
    </div>
    <div id="server-search-results"></div>
    
    <div class="invite-input">
      <input id="invite-code-input" placeholder="Код приглашения" />
      <button onclick="joinServerByInvite()">➕</button>
    </div>
    
    <button onclick="createServer()" style="margin-top:10px; background:#89b4fa; border:none; padding:6px; border-radius:6px; cursor:pointer; font-weight:bold; width:100%;">+ Создать сервер</button>
    
    <h3 style="margin-top:20px;">👥 Друзья</h3>
    <div id="friends-list"></div>
    
    <h3 style="margin-top:10px;">🔍 Найти</h3>
    <input id="search-user" placeholder="Поиск..." oninput="searchUsers()" style="width:100%; padding:6px; border-radius:6px; border:none; background:#45475a; color:#cdd6f4;" />
    <div id="search-results"></div>
    
    <h3 style="margin-top:20px;">🟢 Онлайн</h3>
    <div id="users-list"></div>
  </div>

  <div class="chat">
    <div class="chat-header" id="chat-header">
      <span id="chat-title"># general</span>
      <span id="chat-extra"></span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <input id="message-input" placeholder="Сообщение..." />
      <button onclick="sendMessage()">Отправить</button>
    </div>
  </div>
</div>

<!-- ОКНО ЗВОНКА -->
<div id="call-overlay">
  <div id="call-window">
    <div class="caller-avatar" id="caller-avatar">👤</div>
    <div class="caller-name" id="caller-name">Имя</div>
    <div class="call-status" id="call-status">Звонок...</div>
    <div class="call-timer" id="call-timer">00:00</div>
    <div style="margin-bottom:15px;">
      <span>Ты: </span>
      <span id="my-voice-indicator" class="voice-indicator silent"></span>
      <span style="margin-left:20px;">Собеседник: </span>
      <span id="their-voice-indicator" class="voice-indicator silent"></span>
    </div>
    <div class="call-buttons" id="call-buttons"></div>
  </div>
</div>

<script>
  let socket, currentUser, currentChannel, currentServer, token;
  let localStream = null;
  let peerConnection = null;
  let callInProgress = false;
  let currentCallerId = null;
  let currentCallerUsername = null;
  let isMuted = false;
  let isPrivateChat = false;
  let privateChatFriendId = null;
  let privateChatFriendName = null;
  let callTimerInterval = null;
  let callSeconds = 0;
  let audioContext = null;
  let analyser = null;
  let dataArray = null;
  let animationId = null;
  let isCaller = false;
  let isAwaitingAnswer = false;

  // ===== ЗАПОМИНАНИЕ ЛОГИНА =====
  function loadSavedLogin() {
    const saved = localStorage.getItem('discord_user');
    if (saved) {
      try {
        const data = JSON.parse(saved);
        document.getElementById('login-username').value = data.username || '';
        document.getElementById('login-password').value = data.password || '';
        if (data.username && data.password) {
          document.getElementById('remember-me').checked = true;
          // Автоматический вход
          setTimeout(() => login(), 300);
        }
      } catch (e) {}
    }
  }

  function saveLogin(username, password) {
    if (document.getElementById('remember-me').checked) {
      localStorage.setItem('discord_user', JSON.stringify({ username, password }));
    } else {
      localStorage.removeItem('discord_user');
    }
  }

  // ===== АУТЕНТИФИКАЦИЯ =====
  function showRegister() {
    document.getElementById('login').classList.add('hidden');
    document.getElementById('register').classList.remove('hidden');
  }
  function showLogin() {
    document.getElementById('register').classList.add('hidden');
    document.getElementById('login').classList.remove('hidden');
  }

  async function register() {
    const username = document.getElementById('reg-username').value;
    const password = document.getElementById('reg-password').value;
    const res = await fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    if (res.ok) { alert('Зарегистрирован! Войдите.'); showLogin(); }
    else alert('Ошибка регистрации');
  }

  async function login() {
    const username = document.getElementById('login-username').value;
    const password = document.getElementById('login-password').value;
    
    if (!username || !password) {
      alert('Введите логин и пароль');
      return;
    }
    
    const res = await fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (data.token) {
      token = data.token;
      currentUser = data.user;
      saveLogin(username, password);
      document.getElementById('auth').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      initSocket();
      loadServers();
      loadFriends();
      updateChatTitle();
    } else alert('Неверный логин или пароль');
  }

  // ===== WEBSOCKET =====
  function initSocket() {
    socket = io();
    socket.on('connect', () => {
      socket.emit('join', { userId: currentUser.id, username: currentUser.username });
    });

    socket.on('users', (users) => {
      const list = document.getElementById('users-list');
      list.innerHTML = users.map(u => `
        <div class="online-user" data-socketid="${u.socketId}" data-userid="${u.userId}" data-username="${u.username}">
          <span><span class="status-dot online"></span>${u.username}</span>
          ${u.userId !== currentUser.id ? `<button class="btn-call" onclick="startCall('${u.socketId}', '${u.username}')">📞</button>` : ''}
        </div>
      `).join('');
    });

    socket.on('message', addMessage);
    socket.on('private-message', (data) => {
      if (isPrivateChat && (data.from_user === privateChatFriendId || data.to_user === privateChatFriendId)) {
        addPrivateMessage(data);
      }
    });
    socket.on('private-message-sent', (data) => {
      if (isPrivateChat) addPrivateMessage(data);
    });

    // ===== ВЕБРТК (ИСПРАВЛЕННЫЙ) =====
    socket.on('incoming-call', (data) => {
      currentCallerId = data.from;
      currentCallerUsername = data.fromUsername || 'Неизвестный';
      isCaller = false;
      isAwaitingAnswer = false;
      showCallWindow('incoming');
    });

    socket.on('call-answered', async (data) => {
      if (peerConnection && peerConnection.signalingState === 'have-local-offer') {
        try {
          await peerConnection.setRemoteDescription(new RTCSessionDescription(data.signal));
          startTimer();
          showCallWindow('active');
        } catch (e) {
          console.error('setRemoteDescription error:', e);
        }
      } else {
        console.log('Неверное состояние для ответа:', peerConnection?.signalingState);
      }
    });

    socket.on('ice-candidate', async (data) => {
      if (peerConnection) {
        try {
          await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
        } catch (e) { console.error('addIceCandidate error:', e); }
      }
    });

    socket.on('call-ended', () => { endCall(); });
    socket.on('call-failed', (data) => { alert(data.reason || 'Не удалось дозвониться'); endCall(); });

    socket.on('voice-activity', (data) => {
      const indicator = document.getElementById('their-voice-indicator');
      indicator.className = data.isSpeaking ? 'voice-indicator speaking' : 'voice-indicator silent';
    });
  }

  // ===== СЕРВЕРА =====
  async function loadServers() {
    const res = await fetch(`/servers/${currentUser.id}`);
    const servers = await res.json();
    document.getElementById('servers-list').innerHTML = servers.map(s => 
      `<div class="item" onclick="selectServer(${s.id})"># ${s.name}</div>`
    ).join('');
    if (servers.length) selectServer(servers[0].id);
  }

  async function createServer() {
    const name = prompt('Название сервера:');
    if (!name) return;
    const res = await fetch('/servers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, owner_id: currentUser.id })
    });
    const data = await res.json();
    alert(`Сервер создан! Код приглашения: ${data.invite_code}`);
    loadServers();
  }

  async function searchServers(query) {
    const container = document.getElementById('server-search-results');
    if (!query || query.length < 2) { container.innerHTML = ''; return; }
    const res = await fetch(`/servers/search/${encodeURIComponent(query)}`);
    const servers = await res.json();
    container.innerHTML = servers.map(s => `
      <div class="server-result" onclick="joinServer(${s.id})">
        # ${s.name} <span style="font-size:11px;color:#6c7086;">(${s.invite_code})</span>
      </div>
    `).join('');
  }

  async function joinServer(serverId) {
    await fetch('/servers/join', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ invite_code: '', user_id: currentUser.id })
    });
    loadServers();
    document.getElementById('server-search-results').innerHTML = '';
  }

  async function joinServerByInvite() {
    const code = document.getElementById('invite-code-input').value.trim().toUpperCase();
    if (!code) { alert('Введите код приглашения'); return; }
    const res = await fetch('/servers/join', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ invite_code: code, user_id: currentUser.id })
    });
    if (res.ok) {
      alert('Вы присоединились к серверу!');
      loadServers();
      document.getElementById('invite-code-input').value = '';
    } else {
      alert('Неверный код приглашения');
    }
  }

  async function selectServer(serverId) {
    isPrivateChat = false;
    privateChatFriendId = null;
    privateChatFriendName = null;
    updateChatTitle();
    
    currentServer = serverId;
    socket.emit('join-server', serverId);
    const res = await fetch(`/channels/${serverId}`);
    const channels = await res.json();
    const container = document.getElementById('servers-list');
    const channelDiv = document.createElement('div');
    channelDiv.id = 'channels-list';
    channelDiv.innerHTML = channels.map(c => 
      `<div class="item" onclick="selectChannel(${c.id})"># ${c.name}</div>`
    ).join('');
    
    // Кнопка создания канала
    const createBtn = document.createElement('button');
    createBtn.textContent = '+ Создать канал';
    createBtn.style.cssText = 'margin-top:5px; background:#45475a; border:none; padding:4px 8px; border-radius:4px; cursor:pointer; color:#cdd6f4; width:100%;';
    createBtn.onclick = () => createChannel(serverId);
    channelDiv.appendChild(createBtn);
    
    const old = document.getElementById('channels-list');
    if (old) old.remove();
    container.after(channelDiv);
    if (channels.length) selectChannel(channels[0].id);
  }

  async function createChannel(serverId) {
    const name = prompt('Название канала:');
    if (!name) return;
    const isPublic = confirm('Сделать канал публичным? (OK - да, Отмена - приватный)');
    await fetch('/channels', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, server_id: serverId, is_public: isPublic ? 1 : 0 })
    });
    selectServer(serverId);
  }

  async function selectChannel(channelId) {
    currentChannel = channelId;
    socket.emit('join-channel', channelId);
    document.getElementById('chat-title').textContent = `# канал ${channelId}`;
    document.getElementById('chat-extra').innerHTML = '';
    const res = await fetch(`/messages/${channelId}`);
    const messages = await res.json();
    document.getElementById('messages').innerHTML = '';
    messages.forEach(addMessage);
  }

  // ===== ДРУЗЬЯ =====
  async function searchUsers() {
    const q = document.getElementById('search-user').value;
    if (!q || q.length < 2) { document.getElementById('search-results').innerHTML = ''; return; }
    const res = await fetch(`/users/search?q=${q}`);
    const users = await res.json();
    document.getElementById('search-results').innerHTML = users.map(u => `
      <div class="online-user" style="padding:4px 8px;">
        <span>${u.username}</span>
        <button onclick="addFriend(${u.id})" style="background:#a6e3a1; border:none; border-radius:4px; padding:2px 12px; cursor:pointer;">➕</button>
      </div>
    `).join('');
  }

  async function addFriend(userId) {
    const res = await fetch('/friends/request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: currentUser.id, friendId: userId })
    });
    if (res.ok) alert('Заявка отправлена!');
    else alert('Ошибка или уже отправлено');
  }

  async function loadFriends() {
    const res = await fetch(`/friends/${currentUser.id}`);
    const friends = await res.json();
    const container = document.getElementById('friends-list');
    container.innerHTML = friends.map(f => `
      <div class="friend-item">
        <span>${f.username}</span>
        <div>
          <button class="btn-chat" onclick="openPrivateChat(${f.id}, '${f.username}')">💬</button>
          <button class="btn-call" onclick="callFriendByName('${f.username}')">📞</button>
        </div>
      </div>
    `).join('');

    const reqRes = await fetch(`/friends/requests/${currentUser.id}`);
    const requests = await reqRes.json();
    if (requests.length > 0) {
      container.innerHTML += '<div style="margin-top:10px; border-top:1px solid #313244; padding-top:10px;"><b>📩 Заявки:</b></div>';
      requests.forEach(r => {
        container.innerHTML += `
          <div class="friend-item">
            <span>${r.username}</span>
            <button onclick="acceptFriend(${r.id})" style="background:#a6e3a1; border:none; border-radius:4px; padding:2px 12px; cursor:pointer;">✅</button>
          </div>
        `;
      });
    }
  }

  async function acceptFriend(userId) {
    await fetch('/friends/accept', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: currentUser.id, friendId: userId })
    });
    loadFriends();
  }

  function callFriendByName(username) {
    const users = document.querySelectorAll('#users-list .online-user');
    for (let el of users) {
      if (el.dataset.username === username) {
        startCall(el.dataset.socketid, username);
        return;
      }
    }
    alert(`${username} не в сети`);
  }

  // ===== ЛИЧНЫЙ ЧАТ =====
  async function openPrivateChat(friendId, friendName) {
    isPrivateChat = true;
    privateChatFriendId = friendId;
    privateChatFriendName = friendName;
    
    document.getElementById('chat-title').textContent = `💬 ${friendName}`;
    document.getElementById('chat-extra').innerHTML = `<span class="private-chat-indicator">🔒 Личный чат</span>`;
    document.getElementById('messages').innerHTML = '';
    
    const res = await fetch(`/private/messages/${currentUser.id}/${friendId}`);
    const messages = await res.json();
    messages.forEach(msg => addPrivateMessage(msg));
  }

  function addPrivateMessage(msg) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message';
    const isMine = msg.from_user === currentUser.id;
    div.style.alignSelf = isMine ? 'flex-end' : 'flex-start';
    div.style.background = isMine ? '#45475a' : '#313244';
    div.innerHTML = `
      <span class="user">${isMine ? 'Ты' : privateChatFriendName}</span>
      <span class="time">${new Date(msg.timestamp).toLocaleTimeString()}</span>
      <div>${msg.content}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function updateChatTitle() {
    if (!isPrivateChat) {
      document.getElementById('chat-title').textContent = '# general';
      document.getElementById('chat-extra').innerHTML = '';
    }
  }

  function addMessage(msg) {
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message';
    div.innerHTML = `<span class="user">${msg.username}</span><span class="time">${new Date(msg.timestamp).toLocaleTimeString()}</span><div>${msg.content}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
  }

  function sendMessage() {
    const input = document.getElementById('message-input');
    const content = input.value.trim();
    if (!content) return;
    
    if (isPrivateChat && privateChatFriendId) {
      const users = document.querySelectorAll('#users-list .online-user');
      let targetSocketId = null;
      for (let el of users) {
        if (parseInt(el.dataset.userid) === privateChatFriendId) {
          targetSocketId = el.dataset.socketid;
          break;
        }
      }
      
      socket.emit('private-message', {
        from_user: currentUser.id,
        to_user: privateChatFriendId,
        content,
        to_socket_id: targetSocketId
      });
      
      addPrivateMessage({ from_user: currentUser.id, content, timestamp: new Date().toISOString() });
      input.value = '';
      return;
    }
    
    if (!currentChannel) return;
    socket.emit('message', { channelId: currentChannel, userId: currentUser.id, content });
    input.value = '';
  }

  // ===== ЗВОНКИ (ИСПРАВЛЕННЫЕ) =====
  async function startCall(socketId, username) {
    if (callInProgress) { alert('Уже в звонке!'); return; }
    if (socketId === socket.id) { alert('Это ты!'); return; }

    isCaller = true;
    isAwaitingAnswer = true;
    currentCallerId = socketId;
    currentCallerUsername = username;

    try {
      localStream = await navigator.mediaDevices.getUserMedia({ 
        audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
      });
      
      setupVoiceDetection();

      const config = {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' }
        ]
      };

      peerConnection = new RTCPeerConnection(config);

      localStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, localStream);
      });

      peerConnection.ontrack = (event) => {
        if (event.streams && event.streams[0]) {
          const audio = new Audio();
          audio.srcObject = event.streams[0];
          audio.autoplay = true;
          audio.volume = 1.0;
          audio.play().catch(e => console.log('Audio play error:', e));
        }
      };

      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit('ice-candidate', { to: socketId, candidate: event.candidate });
        }
      };

      peerConnection.oniceconnectionstatechange = () => {
        if (peerConnection.iceConnectionState === 'failed' || peerConnection.iceConnectionState === 'disconnected') {
          endCall();
        }
      };

      const offer = await peerConnection.createOffer({
        offerToReceiveAudio: true,
        offerToReceiveVideo: false
      });
      await peerConnection.setLocalDescription(offer);

      socket.emit('call-user', { 
        to: socketId, 
        signal: offer,
        fromUsername: currentUser.username
      });

      callInProgress = true;
      showCallWindow('outgoing');
    } catch (e) {
      console.error('Ошибка звонка:', e);
      alert('Нет доступа к микрофону');
      endCall();
    }
  }

  async function acceptCall() {
    if (!currentCallerId) return;
    
    try {
      if (!localStream) {
        localStream = await navigator.mediaDevices.getUserMedia({ 
          audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
        });
        setupVoiceDetection();
      }

      const config = {
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' }
        ]
      };

      peerConnection = new RTCPeerConnection(config);

      localStream.getTracks().forEach(track => {
        peerConnection.addTrack(track, localStream);
      });

      peerConnection.ontrack = (event) => {
        if (event.streams && event.streams[0]) {
          const audio = new Audio();
          audio.srcObject = event.streams[0];
          audio.autoplay = true;
          audio.volume = 1.0;
          audio.play().catch(e => console.log('Audio play error:', e));
        }
      };

      peerConnection.onicecandidate = (event) => {
        if (event.candidate) {
          socket.emit('ice-candidate', { to: currentCallerId, candidate: event.candidate });
        }
      };

      const answer = await peerConnection.createAnswer({
        offerToReceiveAudio: true,
        offerToReceiveVideo: false
      });
      await peerConnection.setLocalDescription(answer);

      socket.emit('answer-call', { to: currentCallerId, signal: answer });

      callInProgress = true;
      isCaller = false;
      isAwaitingAnswer = false;
      startTimer();
      showCallWindow('active');
    } catch (e) {
      console.error('Ошибка принятия звонка:', e);
      alert('Ошибка: ' + e.message);
    }
  }

  function rejectCall() {
    if (currentCallerId) {
      socket.emit('end-call', { to: currentCallerId });
    }
    endCall();
  }

  function cancelCall() {
    if (currentCallerId) {
      socket.emit('end-call', { to: currentCallerId });
    }
    endCall();
  }

  function endCall() {
    if (peerConnection) {
      peerConnection.close();
      peerConnection = null;
    }
    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }
    if (audioContext) {
      audioContext.close();
      audioContext = null;
    }
    if (animationId) {
      cancelAnimationFrame(animationId);
      animationId = null;
    }
    if (callTimerInterval) {
      clearInterval(callTimerInterval);
      callTimerInterval = null;
    }
    callInProgress = false;
    isCaller = false;
    isAwaitingAnswer = false;
    callSeconds = 0;
    document.getElementById('call-overlay').classList.remove('active');
    document.getElementById('my-voice-indicator').className = 'voice-indicator silent';
    document.getElementById('their-voice-indicator').className = 'voice-indicator silent';
    currentCallerId = null;
  }

  function toggleMute() {
    isMuted = !isMuted;
    if (localStream) {
      localStream.getAudioTracks().forEach(track => {
        track.enabled = !isMuted;
      });
    }
    const muteBtn = document.querySelector('.btn-mute');
    if (muteBtn) {
      muteBtn.textContent = isMuted ? '🔇 Без звука' : '🎙️ Вкл. звук';
    }
  }

  function startTimer() {
    callSeconds = 0;
    if (callTimerInterval) clearInterval(callTimerInterval);
    callTimerInterval = setInterval(() => {
      callSeconds++;
      const mins = String(Math.floor(callSeconds / 60)).padStart(2, '0');
      const secs = String(callSeconds % 60).padStart(2, '0');
      document.getElementById('call-timer').textContent = `${mins}:${secs}`;
    }, 1000);
  }

  function setupVoiceDetection() {
    if (!localStream) return;
    if (audioContext) audioContext.close();
    audioContext = new AudioContext();
    const source = audioContext.createMediaStreamSource(localStream);
    analyser = audioContext.createAnalyser();
    analyser.fftSize = 256;
    source.connect(analyser);
    dataArray = new Uint8Array(analyser.fftSize);
    detectVoice();
  }

  function detectVoice() {
    if (!analyser) return;
    analyser.getByteTimeDomainData(dataArray);
    let sum = 0;
    for (let i = 0; i < dataArray.length; i++) {
      const value = (dataArray[i] - 128) / 128;
      sum += value * value;
    }
    const rms = Math.sqrt(sum / dataArray.length);
    const isSpeaking = rms > 0.015;

    const indicator = document.getElementById('my-voice-indicator');
    indicator.className = isSpeaking ? 'voice-indicator speaking' : 'voice-indicator silent';

    if (currentCallerId) {
      socket.emit('voice-activity', { to: currentCallerId, isSpeaking });
    }

    animationId = requestAnimationFrame(detectVoice);
  }

  // ===== UI ЗВОНКА =====
  function showCallWindow(type) {
    const overlay = document.getElementById('call-overlay');
    const nameEl = document.getElementById('caller-name');
    const statusEl = document.getElementById('call-status');
    const avatarEl = document.getElementById('caller-avatar');
    const buttonsEl = document.getElementById('call-buttons');
    const timerEl = document.getElementById('call-timer');

    overlay.classList.add('active');

    if (currentCallerUsername) {
      nameEl.textContent = currentCallerUsername;
      avatarEl.textContent = currentCallerUsername.charAt(0).toUpperCase();
    }

    if (type === 'incoming') {
      statusEl.textContent = '📞 Входящий звонок...';
      timerEl.textContent = '00:00';
      buttonsEl.innerHTML = `
        <button class="btn-accept" onclick="acceptCall()">📞 Принять</button>
        <button class="btn-reject" onclick="rejectCall()">❌ Отклонить</button>
      `;
    } else if (type === 'outgoing') {
      statusEl.textContent = '📤 Исходящий звонок...';
      timerEl.textContent = '00:00';
      buttonsEl.innerHTML = `
        <button class="btn-cancel" onclick="cancelCall()">❌ Отменить</button>
      `;
    } else if (type === 'active') {
      statusEl.textContent = '🟢 В разговоре';
      buttonsEl.innerHTML = `
        <button class="btn-mute" onclick="toggleMute()">🎙️ Вкл. звук</button>
        <button class="btn-end" onclick="endCall()">📴 Завершить</button>
      `;
    }
  }

  // ===== ЗАГРУЗКА =====
  loadSavedLogin();

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && document.activeElement.id === 'message-input') sendMessage();
  });
</script>
