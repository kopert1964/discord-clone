<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Discord Clone</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-tertiary: #0f3460;
      --text-primary: #e0e0e0;
      --text-secondary: #a0a0b0;
      --accent: #6c63ff;
      --accent-hover: #5a52d5;
      --danger: #e74c3c;
      --success: #2ecc71;
      --warning: #f39c12;
      --border: #2a2a4a;
      --shadow: 0 4px 6px rgba(0,0,0,0.3);
      --radius: 12px;
      --transition: all 0.2s ease;
    }
    
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    /* АНИМАЦИИ */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to { opacity: 1; transform: translateX(0); }
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    @keyframes bounceIn {
      0% { transform: scale(0.3); opacity: 0; }
      50% { transform: scale(1.05); }
      70% { transform: scale(0.9); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    @keyframes typing {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }
    
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    .slide-in-left { animation: slideInLeft 0.3s ease forwards; }
    .slide-in-right { animation: slideInRight 0.3s ease forwards; }
    .bounce-in { animation: bounceIn 0.4s ease forwards; }
    
    /* АВТОРИЗАЦИЯ */
    #auth-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); z-index: 9999;
      display: flex; align-items: center; justify-content: center;
    }
    
    #auth-box {
      background: var(--bg-secondary); padding: 40px;
      border-radius: var(--radius); width: 400px; max-width: 90%;
      box-shadow: var(--shadow); animation: bounceIn 0.5s ease;
    }
    
    #auth-box h2 {
      text-align: center; margin-bottom: 24px; color: var(--accent); font-size: 24px;
    }
    
    #auth-box input {
      width: 100%; padding: 12px 16px; margin-bottom: 12px;
      background: var(--bg-primary); border: 2px solid var(--border);
      border-radius: 8px; color: var(--text-primary); font-size: 14px;
      transition: var(--transition); outline: none;
    }
    
    #auth-box input:focus {
      border-color: var(--accent);
    }
    
    #auth-box button {
      width: 100%; padding: 12px; background: var(--accent);
      color: white; border: none; border-radius: 8px; font-size: 16px;
      font-weight: 600; cursor: pointer; transition: var(--transition);
    }
    
    #auth-box button:hover { background: var(--accent-hover); transform: translateY(-2px); }
    
    #auth-toggle { text-align: center; margin-top: 12px; color: var(--text-secondary); cursor: pointer; font-size: 14px; }
    #auth-toggle span { color: var(--accent); text-decoration: underline; }
    
    .auth-error { color: var(--danger); text-align: center; margin-bottom: 12px; font-size: 14px; min-height: 20px; }
    
    /* ОСНОВНОЙ ИНТЕРФЕЙС */
    #app {
      display: flex; height: 100vh; opacity: 0; transition: opacity 0.3s;
    }
    
    #app.visible { opacity: 1; }
    
    /* САЙДБАР */
    #sidebar {
      width: 260px; background: var(--bg-secondary); display: flex;
      flex-direction: column; border-right: 1px solid var(--border);
      animation: slideInLeft 0.4s ease;
    }
    
    #sidebar-header {
      padding: 20px; border-bottom: 1px solid var(--border);
      font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 8px;
    }
    
    #channels-list {
      flex: 1; overflow-y: auto; padding: 8px;
    }
    
    .channel-item {
      padding: 10px 16px; margin: 2px 0; border-radius: 8px;
      cursor: pointer; transition: var(--transition); display: flex;
      align-items: center; gap: 8px; font-size: 14px; color: var(--text-secondary);
    }
    
    .channel-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .channel-item.active { background: var(--accent); color: white; font-weight: 600; }
    
    #add-channel {
      padding: 10px 16px; margin: 8px; border-radius: 8px;
      cursor: pointer; background: transparent; border: 2px dashed var(--border);
      color: var(--text-secondary); text-align: center; font-size: 13px;
      transition: var(--transition);
    }
    
    #add-channel:hover { border-color: var(--accent); color: var(--accent); }
    
    /* ПРОФИЛЬ В САЙДБАРЕ */
    #sidebar-profile {
      padding: 16px; border-top: 1px solid var(--border); display: flex;
      align-items: center; gap: 12px; cursor: pointer; transition: var(--transition);
    }
    
    #sidebar-profile:hover { background: var(--bg-tertiary); }
    
    #sidebar-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 16px; color: white; position: relative;
      overflow: hidden; flex-shrink: 0;
    }
    
    #sidebar-avatar img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
    }
    
    .status-dot {
      position: absolute; bottom: 0; right: 0; width: 12px; height: 12px;
      border-radius: 50%; border: 2px solid var(--bg-secondary);
    }
    
    .status-dot.online { background: var(--success); }
    .status-dot.idle { background: var(--warning); }
    .status-dot.dnd { background: var(--danger); }
    .status-dot.offline { background: #666; }
    
    #sidebar-username {
      font-weight: 600; font-size: 14px; flex: 1; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    
    /* ОСНОВНАЯ ОБЛАСТЬ */
    #main {
      flex: 1; display: flex; flex-direction: column; background: var(--bg-primary);
    }
    
    #chat-header {
      padding: 16px 24px; border-bottom: 1px solid var(--border);
      font-weight: 600; font-size: 16px; display: flex; align-items: center; gap: 8px;
    }
    
    #messages {
      flex: 1; overflow-y: auto; padding: 16px 24px; display: flex;
      flex-direction: column; gap: 4px;
    }
    
    .message {
      display: flex; gap: 12px; padding: 8px 12px; border-radius: 8px;
      transition: var(--transition); animation: fadeIn 0.2s ease;
      position: relative;
    }
    
    .message:hover { background: rgba(255,255,255,0.03); }
    
    .message.highlight {
      animation: pulse 0.6s ease;
      background: rgba(108, 99, 255, 0.15);
    }
    
    .message-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: white; flex-shrink: 0;
      overflow: hidden;
    }
    
    .message-avatar img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
    }
    
    .message-content { flex: 1; }
    
    .message-header {
      display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
    }
    
    .message-username { font-weight: 600; font-size: 14px; }
    .message-time { font-size: 11px; color: var(--text-secondary); }
    .message-edited { font-size: 10px; color: var(--text-secondary); font-style: italic; }
    
    .message-text { font-size: 14px; line-height: 1.5; word-break: break-word; }
    
    .message-actions {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      display: none; gap: 4px; background: var(--bg-secondary);
      border-radius: 6px; padding: 4px; box-shadow: var(--shadow);
    }
    
    .message:hover .message-actions { display: flex; }
    
    .message-actions button {
      background: none; border: none; color: var(--text-secondary);
      cursor: pointer; padding: 4px 8px; border-radius: 4px; font-size: 14px;
      transition: var(--transition);
    }
    
    .message-actions button:hover { color: var(--text-primary); background: var(--bg-tertiary); }
    
    /* ВВОД СООБЩЕНИЯ */
    #input-area {
      padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 12px;
    }
    
    #message-input {
      flex: 1; padding: 12px 16px; background: var(--bg-secondary);
      border: 2px solid var(--border); border-radius: 8px;
      color: var(--text-primary); font-size: 14px; resize: none;
      outline: none; font-family: inherit; transition: var(--transition);
    }
    
    #message-input:focus { border-color: var(--accent); }
    
    #send-btn, #call-btn {
      padding: 12px 20px; background: var(--accent); color: white;
      border: none; border-radius: 8px; cursor: pointer; font-weight: 600;
      font-size: 14px; transition: var(--transition); white-space: nowrap;
    }
    
    #send-btn:hover, #call-btn:hover { background: var(--accent-hover); transform: translateY(-2px); }
    
    /* СПИСОК ПОЛЬЗОВАТЕЛЕЙ */
    #users-panel {
      width: 220px; background: var(--bg-secondary); border-left: 1px solid var(--border);
      padding: 16px; overflow-y: auto; animation: slideInRight 0.4s ease;
    }
    
    #users-panel h3 {
      font-size: 12px; text-transform: uppercase; color: var(--text-secondary);
      margin-bottom: 12px; letter-spacing: 1px;
    }
    
    .user-item {
      display: flex; align-items: center; gap: 10px; padding: 8px;
      border-radius: 8px; cursor: pointer; transition: var(--transition);
      margin-bottom: 4px;
    }
    
    .user-item:hover { background: var(--bg-tertiary); }
    
    .user-item-avatar {
      width: 32px; height: 32px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; color: white; position: relative;
      overflow: hidden; flex-shrink: 0;
    }
    
    .user-item-avatar img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
    }
    
    .user-item-name { font-size: 13px; font-weight: 500; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    
    /* ОКНО ЗВОНКА */
    #call-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); z-index: 9998; display: none;
      align-items: center; justify-content: center; flex-direction: column;
    }
    
    #call-overlay.active { display: flex; animation: fadeIn 0.3s ease; }
    
    #call-window {
      background: var(--bg-secondary); padding: 40px; border-radius: var(--radius);
      text-align: center; box-shadow: var(--shadow); animation: bounceIn 0.4s ease;
    }
    
    #call-window h3 { margin-bottom: 16px; font-size: 20px; }
    #call-timer { font-size: 32px; font-weight: 700; margin: 16px 0; color: var(--accent); }
    
    #call-voice-indicator {
      width: 80px; height: 80px; border-radius: 50%; background: var(--bg-tertiary);
      margin: 16px auto; display: flex; align-items: center; justify-content: center;
      font-size: 32px; transition: var(--transition);
    }
    
    #call-voice-indicator.speaking {
      background: var(--accent); box-shadow: 0 0 20px var(--accent);
      animation: pulse 1.5s infinite;
    }
    
    .call-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
    
    .call-buttons button {
      padding: 12px 24px; border-radius: 8px; border: none; cursor: pointer;
      font-weight: 600; font-size: 14px; transition: var(--transition);
    }
    
    .btn-end { background: var(--danger); color: white; }
    .btn-end:hover { background: #c0392b; transform: scale(1.05); }
    .btn-mute { background: var(--bg-tertiary); color: var(--text-primary); }
    .btn-mute:hover { background: #1a1a3e; }
    .btn-mute.muted { background: var(--warning); color: black; }
    
    /* УВЕДОМЛЕНИЯ */
    #notification {
      position: fixed; top: 20px; right: 20px; background: var(--bg-secondary);
      padding: 16px 24px; border-radius: var(--radius); box-shadow: var(--shadow);
      z-index: 10000; transform: translateX(120%); transition: transform 0.3s ease;
      display: flex; align-items: center; gap: 12px;
    }
    
    #notification.show { transform: translateX(0); animation: shake 0.5s ease; }
    
    #notification-avatar {
      width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
      display: flex; align-items: center; justify-content: center; font-weight: 700;
      color: white; overflow: hidden; flex-shrink: 0;
    }
    
    #notification-avatar img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
    }
    
    #notification-text { font-size: 14px; }
    #notification-text strong { color: var(--accent); }
    
    /* МОДАЛЬНОЕ ОКНО СТАТУСА */
    #status-modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); z-index: 10001; display: none;
      align-items: center; justify-content: center;
    }
    
    #status-modal.active { display: flex; animation: fadeIn 0.2s ease; }
    
    #status-modal-content {
      background: var(--bg-secondary); padding: 24px; border-radius: var(--radius);
      box-shadow: var(--shadow); width: 300px;
    }
    
    #status-modal-content h3 { margin-bottom: 16px; text-align: center; }
    
    .status-option {
      padding: 12px 16px; margin: 4px 0; border-radius: 8px; cursor: pointer;
      transition: var(--transition); display: flex; align-items: center; gap: 10px;
    }
    
    .status-option:hover { background: var(--bg-tertiary); }
    
    /* СКРОЛЛБАР */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    
    /* МОБИЛЬНАЯ АДАПТАЦИЯ */
    @media (max-width: 768px) {
      #sidebar { width: 60px; }
      #sidebar-header { font-size: 0; justify-content: center; padding: 16px 8px; }
      #sidebar-header::after { content: '📱'; font-size: 20px; }
      .channel-item { padding: 10px; justify-content: center; font-size: 0; }
      .channel-item::after { content: attr(data-icon); font-size: 18px; }
      #sidebar-username { display: none; }
      #users-panel { display: none; }
      #input-area { padding: 8px; gap: 8px; }
      #message-input { font-size: 13px; }
      #send-btn, #call-btn { padding: 10px 14px; font-size: 12px; }
    }
  </style>
</head>
<body>
    <!-- АВТОРИЗАЦИЯ -->
  <div id="auth-overlay">
    <div id="auth-box">
      <h2>🚀 Вход</h2>
      <div class="auth-error" id="auth-error"></div>
      <input type="text" id="auth-username" placeholder="Никнейм">
      <input type="email" id="auth-email" placeholder="Email">
      <input type="password" id="auth-password" placeholder="Пароль">
      <button id="auth-submit">Войти</button>
      <div id="auth-toggle">Нет аккаунта? <span>Зарегистрироваться</span></div>
    </div>
  </div>

  <!-- ОСНОВНОЙ ИНТЕРФЕЙС -->
  <div id="app">
    <!-- САЙДБАР -->
    <div id="sidebar">
      <div id="sidebar-header">💬 Discord Clone</div>
      <div id="channels-list"></div>
      <div id="add-channel">+ Создать канал</div>
      <div id="sidebar-profile">
        <div id="sidebar-avatar">
          <span id="sidebar-avatar-text">?</span>
        </div>
        <span id="sidebar-username"></span>
        <span style="font-size:12px;color:var(--text-secondary)">▼</span>
      </div>
    </div>

    <!-- ЧАТ -->
    <div id="main">
      <div id="chat-header">📢 Основной</div>
      <div id="messages"></div>
      <div id="input-area">
        <button id="call-btn">📞 Звонок</button>
        <input type="text" id="message-input" placeholder="Введите сообщение..." maxlength="2000">
        <button id="send-btn">➤</button>
      </div>
    </div>

    <!-- ПОЛЬЗОВАТЕЛИ -->
    <div id="users-panel">
      <h3>👥 Онлайн</h3>
      <div id="users-list"></div>
    </div>
  </div>

  <!-- ОКНО ЗВОНКА -->
  <div id="call-overlay">
    <div id="call-window">
      <h3>📞 Звонок</h3>
      <div id="call-voice-indicator">🎤</div>
      <div id="call-timer">00:00</div>
      <div class="call-buttons">
        <button class="btn-mute" onclick="toggleCallMute()">🎙️ Выкл. микрофон</button>
        <button class="btn-end" onclick="endCall()">🔴 Завершить</button>
      </div>
      <div style="margin-top:12px">
        <label style="color:var(--text-secondary);font-size:12px">Громкость:</label>
        <input type="range" id="remote-volume" min="0" max="100" value="100" oninput="setRemoteVolume(this.value)" style="width:100%">
      </div>
    </div>
  </div>

  <!-- МОДАЛЬНОЕ ОКНО СТАТУСА -->
  <div id="status-modal">
    <div id="status-modal-content">
      <h3>Выберите статус</h3>
      <div class="status-option" onclick="setUserStatus('online')">🟢 Онлайн</div>
      <div class="status-option" onclick="setUserStatus('idle')">🟡 Отошёл</div>
      <div class="status-option" onclick="setUserStatus('dnd')">🔴 Не беспокоить</div>
      <div class="status-option" onclick="setUserStatus('offline')">⚫ Невидимый</div>
      <button onclick="document.getElementById('status-modal').classList.remove('active')" style="width:100%;margin-top:12px;padding:10px;background:var(--bg-tertiary);color:var(--text-primary);border:none;border-radius:8px;cursor:pointer">Закрыть</button>
    </div>
  </div>

  <!-- УВЕДОМЛЕНИЯ -->
  <div id="notification">
    <div id="notification-avatar">?</div>
    <div id="notification-text"></div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
<script>
  // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
  let socket;
  let currentUser = null;
  let token = localStorage.getItem('token');
  let currentChannel = 'general';
  let users = [];
  let channels = [];
  
  // Звонки
  let peerConnection;
  let localStream;
  let remoteAudioElement;
  let currentCallerId;
  let callInProgress = false;
  let callSeconds = 0;
  let callTimerInterval;
  let isMuted = false;
  
  // DOM элементы
  const authOverlay = document.getElementById('auth-overlay');
  const authBox = document.getElementById('auth-box');
  const authError = document.getElementById('auth-error');
  const authUsername = document.getElementById('auth-username');
  const authEmail = document.getElementById('auth-email');
  const authPassword = document.getElementById('auth-password');
  const authSubmit = document.getElementById('auth-submit');
  const authToggle = document.getElementById('auth-toggle');
  const appEl = document.getElementById('app');
  const channelsList = document.getElementById('channels-list');
  const chatHeader = document.getElementById('chat-header');
  const messagesEl = document.getElementById('messages');
  const messageInput = document.getElementById('message-input');
  const sendBtn = document.getElementById('send-btn');
  const usersList = document.getElementById('users-list');
  const notification = document.getElementById('notification');
  const notificationAvatar = document.getElementById('notification-avatar');
  const notificationText = document.getElementById('notification-text');
  
  let isLogin = true;
  
  // ==================== ЗВУКИ УВЕДОМЛЕНИЙ ====================
  // Создаём простой звук через AudioContext
  function playNotificationSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g);
      g.connect(ctx.destination);
      o.type = 'sine';
      g.gain.value = 0.1;
      o.frequency.setValueAtTime(800, ctx.currentTime);
      o.frequency.setValueAtTime(1000, ctx.currentTime + 0.1);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.2);
    } catch(e) {}
  }
  
  function playCallSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g);
      g.connect(ctx.destination);
      o.type = 'square';
      g.gain.value = 0.08;
      o.frequency.setValueAtTime(440, ctx.currentTime);
      o.frequency.setValueAtTime(660, ctx.currentTime + 0.15);
      o.frequency.setValueAtTime(880, ctx.currentTime + 0.3);
      o.start(ctx.currentTime);
      o.stop(ctx.currentTime + 0.5);
    } catch(e) {}
  }
  
  // ==================== АВТОРИЗАЦИЯ ====================
  authSubmit.addEventListener('click', async () => {
    const username = authUsername.value.trim();
    const email = authEmail.value.trim();
    const password = authPassword.value;
    
    if (!username || !email || !password) {
      authError.textContent = 'Заполните все поля';
      return;
    }
    
    const endpoint = isLogin ? '/api/login' : '/api/register';
    
    try {
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, email, password })
      });
      
      const data = await res.json();
      
      if (!res.ok) {
        authError.textContent = data.error;
        return;
      }
      
      token = data.token;
      currentUser = data.user;
      localStorage.setItem('token', token);
      
      authOverlay.style.display = 'none';
      initApp();
    } catch(e) {
      authError.textContent = 'Ошибка сервера';
      console.error(e);
    }
  });
  
  authToggle.addEventListener('click', () => {
    isLogin = !isLogin;
    if (isLogin) {
      authBox.querySelector('h2').textContent = '🚀 Вход';
      authSubmit.textContent = 'Войти';
      authToggle.innerHTML = 'Нет аккаунта? <span>Зарегистрироваться</span>';
      authUsername.style.display = 'none';
    } else {
      authBox.querySelector('h2').textContent = '📝 Регистрация';
      authSubmit.textContent = 'Зарегистрироваться';
      authToggle.innerHTML = 'Есть аккаунт? <span>Войти</span>';
      authUsername.style.display = 'block';
    }
    authError.textContent = '';
  });
  
  // Вход по Enter
  [authUsername, authEmail, authPassword].forEach(el => {
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') authSubmit.click();
    });
  });
  
  // ==================== ПРОВЕРКА ТОКЕНА ПРИ ЗАГРУЗКЕ ====================
  async function checkToken() {
    if (!token) {
      authOverlay.style.display = 'flex';
      return;
    }
    
    try {
      const res = await fetch('/api/me', {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      
      if (!res.ok) {
        localStorage.removeItem('token');
        token = null;
        authOverlay.style.display = 'flex';
        return;
      }
      
      const data = await res.json();
      currentUser = data.user;
      authOverlay.style.display = 'none';
      initApp();
    } catch(e) {
      authOverlay.style.display = 'flex';
    }
  }
  
  // ==================== ИНИЦИАЛИЗАЦИЯ ====================
  async function initApp() {
    appEl.classList.add('visible');
    
    // Подключаем сокет
    socket = io();
    socket.emit('auth', { token });
    
    // Загружаем каналы
    await loadChannels();
    
    // Загружаем пользователей
    await loadUsers();
    
    // Загружаем сообщения текущего канала
    await loadMessages(currentChannel);
    
    // Обновляем профиль в сайдбаре
    updateSidebarProfile();
    
    // События сокета
    setupSocketEvents();
    
    // Обработчики UI
    setupUIEvents();
  }
  
  // ==================== ЗАГРУЗКА КАНАЛОВ ====================
  async function loadChannels() {
    try {
      const res = await fetch('/api/channels');
      channels = await res.json();
      renderChannels();
    } catch(e) { console.error('Ошибка загрузки каналов:', e); }
  }
  
  function renderChannels() {
    channelsList.innerHTML = '';
    channels.forEach(ch => {
      const div = document.createElement('div');
      div.className = 'channel-item' + (ch.id === currentChannel ? ' active' : '');
      div.textContent = ch.name;
      div.setAttribute('data-icon', ch.name.slice(0, 2));
      div.addEventListener('click', () => switchChannel(ch.id));
      channelsList.appendChild(div);
    });
  }
  
  async function switchChannel(channelId) {
    currentChannel = channelId;
    const ch = channels.find(c => c.id === channelId);
    if (ch) chatHeader.textContent = ch.name;
    renderChannels();
    await loadMessages(channelId);
  }
  
  // Создание канала
  document.getElementById('add-channel').addEventListener('click', () => {
    const name = prompt('Название канала:');
    if (!name?.trim()) return;
    
    fetch('/api/channels', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ name: name.trim() })
    }).then(() => loadChannels());
  });
  
  // ==================== ЗАГРУЗКА ПОЛЬЗОВАТЕЛЕЙ ====================
  async function loadUsers() {
    try {
      const res = await fetch('/api/users');
      users = await res.json();
      renderUsers();
    } catch(e) { console.error('Ошибка загрузки пользователей:', e); }
  }
  
  function renderUsers() {
    usersList.innerHTML = '';
    const online = users.filter(u => u.status !== 'offline');
    const offline = users.filter(u => u.status === 'offline');
    
    [...online, ...offline].forEach(user => {
      const div = document.createElement('div');
      div.className = 'user-item';
      div.innerHTML = `
        <div class="user-item-avatar">
          ${user.avatar ? `<img src="${user.avatar}" alt="">` : user.username[0].toUpperCase()}
          <span class="status-dot ${user.status}"></span>
        </div>
        <span class="user-item-name">${user.username}</span>
      `;
      usersList.appendChild(div);
    });
  }
  
  // ==================== ЗАГРУЗКА СООБЩЕНИЙ ====================
  async function loadMessages(channelId) {
    try {
      const res = await fetch(`/api/messages/${channelId}`);
      const msgs = await res.json();
      messagesEl.innerHTML = '';
      msgs.forEach(msg => addMessageToDOM(msg, false));
      messagesEl.scrollTop = messagesEl.scrollHeight;
    } catch(e) { console.error('Ошибка загрузки сообщений:', e); }
  }
  
  function addMessageToDOM(msg, animate = true) {
    const div = document.createElement('div');
    div.className = 'message' + (animate ? ' fade-in' : '');
    div.id = 'msg-' + msg.id;
    
    const time = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    
    div.innerHTML = `
      <div class="message-avatar">
        ${msg.avatar ? `<img src="${msg.avatar}" alt="">` : (msg.username[0]?.toUpperCase() || '?')}
      </div>
      <div class="message-content">
        <div class="message-header">
          <span class="message-username">${msg.username}</span>
          <span class="message-time">${time}</span>
          ${msg.edited ? '<span class="message-edited">(изменено)</span>' : ''}
        </div>
        <div class="message-text">${escapeHTML(msg.text)}</div>
      </div>
    `;
    
    // Кнопки редактирования/удаления (только для своих сообщений)
    if (msg.userId === currentUser?.id) {
      const actions = document.createElement('div');
      actions.className = 'message-actions';
      actions.innerHTML = `
        <button title="Редактировать" onclick="editMessage('${msg.id}')">✏️</button>
        <button title="Удалить" onclick="deleteMessage('${msg.id}')">🗑️</button>
      `;
      div.appendChild(actions);
    }
    
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  
  function escapeHTML(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
  
  // ==================== РЕДАКТИРОВАНИЕ / УДАЛЕНИЕ ====================
  function editMessage(msgId) {
    const msgEl = document.getElementById('msg-' + msgId);
    const textEl = msgEl.querySelector('.message-text');
    const oldText = textEl.textContent;
    
    const input = document.createElement('input');
    input.type = 'text';
    input.value = oldText;
    input.style.cssText = 'width:100%;padding:8px;background:var(--bg-primary);border:2px solid var(--accent);border-radius:6px;color:var(--text-primary);font-size:14px;';
    
    textEl.innerHTML = '';
    textEl.appendChild(input);
    input.focus();
    input.select();
    
    const save = () => {
      const newText = input.value.trim();
      if (newText && newText !== oldText) {
        socket.emit('edit-message', { messageId: msgId, text: newText });
      } else {
        textEl.textContent = oldText;
      }
    };
    
    input.addEventListener('blur', save);
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { input.blur(); }
      if (e.key === 'Escape') { textEl.textContent = oldText; }
    });
  }
  
  function deleteMessage(msgId) {
    if (confirm('Удалить сообщение?')) {
      socket.emit('delete-message', { messageId: msgId });
    }
  }
  
  // ==================== ОТПРАВКА СООБЩЕНИЙ ====================
  sendBtn.addEventListener('click', sendMessage);
  messageInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
  
  function sendMessage() {
    const text = messageInput.value.trim();
    if (!text) return;
    
    socket.emit('send-message', { channelId: currentChannel, text });
    messageInput.value = '';
    playNotificationSound();
  }
  
  // ==================== СОКЕТ СОБЫТИЯ ====================
  function setupSocketEvents() {
    socket.on('new-message', (msg) => {
      if (msg.channelId === currentChannel) {
        addMessageToDOM(msg, true);
        if (msg.userId !== currentUser?.id) {
          playNotificationSound();
        }
      }
    });
    
    socket.on('message-edited', ({ messageId, text, edited }) => {
      const msgEl = document.getElementById('msg-' + messageId);
      if (msgEl) {
        msgEl.querySelector('.message-text').textContent = text;
        const editedEl = msgEl.querySelector('.message-edited');
        if (edited) {
          if (!editedEl) {
            const span = document.createElement('span');
            span.className = 'message-edited';
            span.textContent = '(изменено)';
            msgEl.querySelector('.message-header').appendChild(span);
          }
        }
      }
    });
    
    socket.on('message-deleted', ({ messageId }) => {
      const msgEl = document.getElementById('msg-' + messageId);
      if (msgEl) {
        msgEl.style.animation = 'fadeIn 0.2s ease reverse';
        setTimeout(() => msgEl.remove(), 200);
      }
    });
    
    socket.on('user-status', ({ id, status }) => {
      const user = users.find(u => u.id === id);
      if (user) {
        user.status = status;
        renderUsers();
      }
    });
    
    socket.on('user-updated', (userData) => {
      const user = users.find(u => u.id === userData.id);
      if (user) {
        user.avatar = userData.avatar;
        user.status = userData.status;
        renderUsers();
      }
    });
    
    socket.on('channel-created', (channel) => {
      channels.push(channel);
      renderChannels();
    });
    
    // Звонки
    socket.on('call-offer', ({ from, offer, callerName }) => {
      if (callInProgress) return;
      currentCallerId = from;
      playCallSound();
      handleOffer(from, offer);
    });
    
    socket.on('call-answer', ({ from, answer }) => {
      handleAnswer(from, answer);
    });
    
    socket.on('call-ice', ({ from, candidate }) => {
      handleICE(from, candidate);
    });
    
    socket.on('call-accepted', () => {
      console.log('✅ Звонок принят');
    });
    
    socket.on('call-rejected', () => {
      alert('📵 Звонок отклонён');
      endCall();
    });
    
    socket.on('call-ended', () => {
      alert('📴 Собеседник завершил звонок');
      endCall();
    });
  }
  
  // ==================== UI СОБЫТИЯ ====================
  function setupUIEvents() {
    // Кнопка звонка
    document.getElementById('call-btn').addEventListener('click', async () => {
      if (callInProgress) return;
      
      const onlineUsers = users.filter(u => u.id !== currentUser?.id && u.status !== 'offline');
      if (onlineUsers.length === 0) {
        alert('Нет пользователей онлайн для звонка');
        return;
      }
      
      // Если один онлайн — звоним сразу
      let targetId;
      if (onlineUsers.length === 1) {
        targetId = onlineUsers[0].id;
      } else {
        // Список для выбора
        const list = onlineUsers.map((u, i) => `${i+1}. ${u.username}`).join('\n');
        const choice = prompt('Кому звоним?\n\n' + list + '\n\nВведите номер:');
        const idx = parseInt(choice) - 1;
        if (isNaN(idx) || idx < 0 || idx >= onlineUsers.length) return;
        targetId = onlineUsers[idx].id;
      }
      
      currentCallerId = targetId;
      playCallSound();
      await createOffer();
    });
    
    // Профиль в сайдбаре — смена статуса
    document.getElementById('sidebar-profile').addEventListener('click', () => {
      document.getElementById('status-modal').classList.add('active');
    });
    
    // Закрытие модалки статуса по клику вне
    document.getElementById('status-modal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('status-modal')) {
        document.getElementById('status-modal').classList.remove('active');
      }
    });
  }
  
  function updateSidebarProfile() {
    if (!currentUser) return;
    document.getElementById('sidebar-username').textContent = currentUser.username;
    
    const avatarEl = document.getElementById('sidebar-avatar');
    const avatarText = document.getElementById('sidebar-avatar-text');
    
    if (currentUser.avatar) {
      avatarText.style.display = 'none';
      let img = avatarEl.querySelector('img');
      if (!img) {
        img = document.createElement('img');
        img.src = currentUser.avatar;
        avatarEl.appendChild(img);
      }
      img.src = currentUser.avatar;
    } else {
      avatarText.textContent = currentUser.username[0].toUpperCase();
      avatarText.style.display = '';
      const img = avatarEl.querySelector('img');
      if (img) img.remove();
    }
  }
  
  function setUserStatus(status) {
    socket.emit('set-status', { status });
    document.getElementById('status-modal').classList.remove('active');
    showNotification(`Статус: ${status === 'online' ? '🟢 Онлайн' : status === 'idle' ? '🟡 Отошёл' : status === 'dnd' ? '🔴 Не беспокоить' : '⚫ Невидимый'}`);
  }
  
  function showNotification(text) {
    notificationText.innerHTML = text;
    notification.classList.add('show');
    setTimeout(() => notification.classList.remove('show'), 3000);
  }
    // ==================== ЗВОНКИ ====================
  async function createOffer() {
    console.log('📤 Создаю WebRTC offer');
    
    if (!localStream) {
      console.warn('⚠️ localStream отсутствует, запрашиваю...');
      try {
        localStream = await navigator.mediaDevices.getUserMedia({ 
          audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
        });
        console.log('✅ Микрофон получен');
      } catch(err) {
        console.error('❌ Микрофон не получен:', err);
        alert('Ошибка микрофона: ' + err.message);
        endCall();
        return;
      }
    }

    try {
      if (peerConnection) peerConnection.close();
      
      peerConnection = new RTCPeerConnection({ 
        iceServers:[
          {urls:'stun:stun.l.google.com:19302'},
          {urls:'stun:stun1.l.google.com:19302'},
          {
            urls: 'turn:openrelay.metered.ca:80',
            username: 'openrelayproject',
            credential: 'openrelayproject'
          },
          {
            urls: 'turn:openrelay.metered.ca:443',
            username: 'openrelayproject',
            credential: 'openrelayproject'
          },
          {
            urls: 'turn:openrelay.metered.ca:443?transport=tcp',
            username: 'openrelayproject',
            credential: 'openrelayproject'
          }
        ] 
      });
      
      if (localStream && localStream.getTracks().length > 0) {
        console.log('🎵 Добавляю треки:', localStream.getTracks().length);
        localStream.getTracks().forEach(t => {
          peerConnection.addTrack(t, localStream);
        });
      } else {
        console.error('❌ Нет треков для добавления!');
        alert('Нет доступа к микрофону');
        endCall();
        return;
      }
      
      peerConnection.ontrack = (event) => {
        console.log('🎵 Получен удалённый аудиопоток');
        if (event.streams[0]) {
          if (remoteAudioElement) { remoteAudioElement.srcObject = null; remoteAudioElement.remove(); }
          remoteAudioElement = new Audio();
          remoteAudioElement.srcObject = event.streams[0];
          remoteAudioElement.autoplay = true;
          remoteAudioElement.volume = document.getElementById('remote-volume').value / 100;
          remoteAudioElement.play().catch(e => console.error('Play error:', e));
        }
      };
      
      peerConnection.onicecandidate = (e) => {
        if (e.candidate) socket.emit('call-ice', { to: currentCallerId, candidate: e.candidate });
      };
      
      peerConnection.onconnectionstatechange = () => {
        console.log('📡 Состояние:', peerConnection.connectionState);
        if (peerConnection.connectionState === 'failed' || peerConnection.connectionState === 'disconnected') {
          alert('Соединение потеряно');
          endCall();
        }
      };
      
      const offer = await peerConnection.createOffer({ offerToReceiveAudio: true, offerToReceiveVideo: false });
      await peerConnection.setLocalDescription(offer);
      socket.emit('call-offer', { to: currentCallerId, offer });
      
      callInProgress = true;
      startTimer();
      showCallWindow('active');
    } catch(e) { 
      console.error('Offer error:', e); 
      alert('Ошибка создания звонка: ' + e.message);
    }
  }

  async function handleOffer(from, offer) {
    console.log('📨 Обработка offer от:', from);
    try {
      if (!localStream) {
        console.log('🎤 Запрашиваю микрофон в handleOffer...');
        try {
          localStream = await navigator.mediaDevices.getUserMedia({ 
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
          });
          console.log('✅ Микрофон получен, треков:', localStream.getAudioTracks().length);
        } catch(err) {
          console.error('❌ Микрофон не получен:', err);
          alert('Ошибка микрофона: ' + err.message);
          return;
        }
      }

      if (peerConnection) peerConnection.close();
      
      peerConnection = new RTCPeerConnection({ 
        iceServers:[
          {urls:'stun:stun.l.google.com:19302'},
          {urls:'stun:stun1.l.google.com:19302'},
          {
            urls: 'turn:openrelay.metered.ca:80',
            username: 'openrelayproject',
            credential: 'openrelayproject'
          },
          {
            urls: 'turn:openrelay.metered.ca:443',
            username: 'openrelayproject',
            credential: 'openrelayproject'
          },
          {
            urls: 'turn:openrelay.metered.ca:443?transport=tcp',
            username: 'openrelayproject',
            credential: 'openrelayproject'
          }
        ] 
      });
      
      if (localStream && localStream.getTracks().length > 0) {
        console.log('🎵 Добавляю треки в handleOffer:', localStream.getTracks().length);
        localStream.getTracks().forEach(t => {
          peerConnection.addTrack(t, localStream);
        });
      } else {
        console.error('❌ Нет треков!');
        alert('Нет доступа к микрофону');
        return;
      }
      
      peerConnection.ontrack = (event) => {
        console.log('🎵 Получен аудиопоток');
        if (event.streams[0]) {
          if (remoteAudioElement) { remoteAudioElement.srcObject = null; remoteAudioElement.remove(); }
          remoteAudioElement = new Audio();
          remoteAudioElement.srcObject = event.streams[0];
          remoteAudioElement.autoplay = true;
          remoteAudioElement.volume = document.getElementById('remote-volume').value / 100;
          remoteAudioElement.play().catch(e => console.error('Play error:', e));
        }
      };
      
      peerConnection.onicecandidate = (e) => {
        if (e.candidate) socket.emit('call-ice', { to: from, candidate: e.candidate });
      };
      
      peerConnection.onconnectionstatechange = () => {
        console.log('📡 Состояние:', peerConnection.connectionState);
        if (peerConnection.connectionState === 'failed' || peerConnection.connectionState === 'disconnected') {
          alert('Соединение потеряно');
          endCall();
        }
      };
      
      await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await peerConnection.createAnswer();
      await peerConnection.setLocalDescription(answer);
      socket.emit('call-answer', { to: from, answer });
      
      callInProgress = true;
      startTimer();
      showCallWindow('active');
    } catch(e) { 
      console.error('Handle offer error:', e); 
      alert('Ошибка: ' + e.message);
    }
  }

  async function handleAnswer(from, answer) {
    try {
      if (peerConnection) {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        console.log('✅ Answer установлен');
      }
    } catch(e) { console.error('Answer error:', e); }
  }

  async function handleICE(from, candidate) {
    try {
      if (peerConnection) await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
    } catch(e) { console.error('ICE error:', e); }
  }

  function showCallWindow(state) {
    document.getElementById('call-overlay').classList.toggle('active', state === 'active');
  }

  function startTimer() {
    callSeconds = 0;
    if (callTimerInterval) clearInterval(callTimerInterval);
    document.getElementById('call-timer').textContent = '00:00';
    
    callTimerInterval = setInterval(() => {
      callSeconds++;
      const m = String(Math.floor(callSeconds / 60)).padStart(2, '0');
      const s = String(callSeconds % 60).padStart(2, '0');
      document.getElementById('call-timer').textContent = `${m}:${s}`;
    }, 1000);
  }

  function toggleCallMute() {
    isMuted = !isMuted;
    if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
    
    const btn = document.querySelector('.btn-mute');
    if (btn) {
      btn.textContent = isMuted ? '🔇 Вкл. микрофон' : '🎙️ Выкл. микрофон';
      btn.classList.toggle('muted', isMuted);
    }
  }

  function setRemoteVolume(value) {
    if (remoteAudioElement) remoteAudioElement.volume = value / 100;
  }

  function endCall() {
    console.log('📴 Завершение звонка');
    
    if (peerConnection) { peerConnection.close(); peerConnection = null; }
    if (remoteAudioElement) { remoteAudioElement.srcObject = null; remoteAudioElement.remove(); remoteAudioElement = null; }
    if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
    
    callInProgress = false;
    callSeconds = 0;
    isMuted = false;
    
    document.getElementById('call-overlay').classList.remove('active');
    currentCallerId = null;
  }

  // ==================== ЗАПУСК ====================
  checkToken();
</script>
